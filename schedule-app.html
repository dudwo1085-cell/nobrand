const dbRef = (k) => getDb().ref(FB_PATH + "/" + k);

const kv = {
  save: (k, v) => dbRef(k).set(v),
  load: async (k) => {
    const snap = await dbRef(k).once("value");
    return snap.exists() ? snap.val() : null;
  },
  listen: (k, cb) => {
    const ref = dbRef(k);
    ref.on("value", snap => cb(snap.exists() ? snap.val() : null));
    return () => ref.off("value");
  },
};

// ── utils ─────────────────────────────────────────────────────────────────────
const A = (v) => Array.isArray(v) ? v : [];
const O = (v) => (v && typeof v === "object" && !Array.isArray(v)) ? v : {};
const uid = () => "_" + Math.random().toString(36).slice(2,8);
const toM = (t) => { try { const [h,m] = (t||"00:00").split(":").map(Number); return h*60+m; } catch(_){ return 0; } };
const DOW = ["일","월","화","수","목","금","토"];
const EXP = {0:"미이수",1:"견습",2:"보조",3:"독립",4:"마스터"};
const EXP_C = {0:"#475569",1:"#F59E0B",2:"#38BDF8",3:"#10B981",4:"#A78BFA"};
const COLS = ["#F59E0B","#38BDF8","#A78BFA","#10B981","#F87171","#FB923C","#34D399","#E879F9","#60A5FA","#C084FC","#4ADE80","#F472B6","#FACC15","#2DD4BF","#818CF8","#FCA5A5"];
const RQS = { pending:{bg:"#FEF3C7",tx:"#92400E",lb:"대기"}, approved:{bg:"#D1FAE5",tx:"#065F46",lb:"승인"}, rejected:{bg:"#FEE2E2",tx:"#991B1B",lb:"반려"} };

function dayLbl(ds) { try { const [y,m,d]=ds.split("-").map(Number); return DOW[new Date(y,m-1,d).getDay()]||""; } catch(_){ return ""; } }
function plusDays(ds, n) { try { const [y,m,d]=ds.split("-").map(Number); const dt=new Date(y,m-1,d+n); return dt.getFullYear()+"-"+String(dt.getMonth()+1).padStart(2,"0")+"-"+String(dt.getDate()).padStart(2,"0"); } catch(_){ return ds; } }
function calcH(c) { if (!c||c.off||!c.start||!c.end) return 0; return Math.max(0, Math.round(((toM(c.end)-toM(c.start))/60-(c.brk||0))*10)/10); }
function getCell(sched, eid, date) { return O(sched)[eid+"__"+date] || {start:"",end:"",brk:0,off:false}; }
function empCanWork(emp, reqs) { return !reqs||reqs.length===0 || reqs.every(r => (O(emp.skills)[r.skillId]||0) >= r.minLevel); }
function buildWeek(first) {
  const base = first || new Date().toISOString().slice(0,10);
  return Array.from({length:7}, (_,i) => {
    const ds = i===0 ? base : plusDays(base,i);
    const wk = ["토","일"].includes(dayLbl(ds));
    return { id:"d"+i, label:dayLbl(ds), date:ds, shifts:[
      {id:"s"+i+"a", name:"오픈",  start:wk?"10:00":"09:00", end:wk?"15:00":"14:00", color:"#F59E0B", minStaff:2, reqSkills:[]},
      {id:"s"+i+"b", name:"미들",  start:wk?"14:00":"13:00", end:wk?"19:00":"18:00", color:"#38BDF8", minStaff:2, reqSkills:[]},
      {id:"s"+i+"c", name:"마감",  start:wk?"18:00":"17:00", end:wk?"23:00":"22:00", color:"#A78BFA", minStaff:2, reqSkills:[]},
    ]};
  });
}

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const [data, setData] = useState(null);
  const [me,   setMe]   = useState(null); // logged-in employee object

  useEffect(() => {
    // Firebase 실시간 리스너 — 모든 기기에서 데이터 동기화
    const def = defaults();
    const unsubs = [];

    Object.keys(def).forEach(k => {
      const unsub = kv.listen(k, val => {
        setData(prev => {
          // 첫 로드 시 defaults로 초기값 설정 후 Firebase에 저장
          const current = prev || {...def};
          if (val === null) { kv.save(k, def[k]); return {...current}; }
          return {...current, [k]: val};
        });
      });
      unsubs.push(unsub);
    });

    // 최초 로드 완료 보장 (리스너 연결 후 기본값 적용)
    kv.load(Object.keys(def)[0]).then(v => {
      if (v === null) {
        // 완전히 새 DB — 기본값 전체 저장
        const d = defaults();
        Object.keys(d).forEach(k => kv.save(k, d[k]));
      }
    });

    return () => unsubs.forEach(u => u && u());
  }, []);

  function upd(key, val) {
    setData(p => ({...p, [key]: val}));
    kv.save(key, val);
  }

  if (!data) return (
    <div style={{minHeight:"100vh",background:"#0F172A",display:"flex",alignItems:"center",justifyContent:"center"}}>
      <span style={{color:"#94A3B8",fontFamily:"sans-serif"}}>불러오는 중…</span>
    </div>
  );

  if (!me) return <LoginScreen employees={A(data.employees)} onLogin={setMe}/>;

  // 최신 직원 데이터 반영 (이름/색상 변경 등)
  const emp = A(data.employees).find(e => e.id===me.id) || me;

  if (emp.role === "manager") return <ManagerApp data={data} upd={upd} emp={emp} onLogout={()=>setMe(null)}/>;
  return <StaffApp data={data} upd={upd} emp={emp} onLogout={()=>setMe(null)}/>;
}

// ── 통합 로그인 화면 ──────────────────────────────────────────────────────────
function LoginScreen({employees, onLogin}) {
  const [sel, setSel] = useState("");
  const [pin, setPin] = useState("");
  const [err, setErr] = useState(false);
  function tryLogin() {
    const emp = employees.find(e => e.name === sel);
    if (emp && String(emp.pin) === String(pin)) { onLogin(emp); }
    else setErr(true);
  }
  return (
    <div style={{minHeight:"100vh",background:"#0F172A",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{maxWidth:300,width:"100%",background:"#1E293B",border:"1px solid #334155",borderRadius:16,padding:28}}>
        <div style={{textAlign:"center",marginBottom:22}}>
          <div style={{fontSize:44}}>🏪</div>
          <h2 style={{color:"#E2E8F0",fontFamily:"sans-serif",fontWeight:700,fontSize:20,margin:"10px 0 4px"}}>로그인</h2>
          <p style={{color:"#64748B",fontFamily:"sans-serif",fontSize:13,margin:0}}>이름 선택 후 PIN 입력</p>
        </div>
        <label style={{display:"block",color:"#94A3B8",fontSize:11,fontFamily:"sans-serif",fontWeight:600,textTransform:"uppercase",marginBottom:4}}>이름</label>
        <select value={sel} onChange={e=>{setSel(e.target.value);setErr(false);}} style={{...S.inp,marginBottom:12}}>
          <option value="">선택하세요</option>
          {employees.map(e => <option key={e.id} value={e.name}>{e.name}{e.role==="manager"?" ⭐":""}</option>)}
        </select>
        <label style={{display:"block",color:"#94A3B8",fontSize:11,fontFamily:"sans-serif",fontWeight:600,textTransform:"uppercase",marginBottom:4}}>PIN</label>
        <input type="password" value={pin} onChange={e=>{setPin(e.target.value);setErr(false);}} maxLength={6}
          onKeyDown={e=>e.key==="Enter"&&tryLogin()}
          style={{...S.inp,textAlign:"center",letterSpacing:8,fontSize:22,marginBottom:6}}/>
        {err && <p style={{color:"#EF4444",textAlign:"center",fontSize:12,fontFamily:"sans-serif",margin:"0 0 8px"}}>이름 또는 PIN이 틀렸습니다</p>}
        <button onClick={tryLogin} style={{...S.btnP,width:"100%",marginTop:8}}>로그인</button>
      </div>
    </div>
  );
}

// slots: [{hourLabel, m, days: [{date, count, color, names:[]}]}]
// mode: "timetable" | "schedule"
// ── 공유 커버리지 그리드 ─────────────────────────────────────────────────────
// props:
//   week       : [{date, label, shifts:[]}]
//   getCount   : (date, m) => {count, color, names:[{name,color}]}
//   minM, maxM : 시간 범위 (분 단위)
//   selDay     : 이름 펼쳐볼 날짜
//   onDayClick : 헤더 클릭 콜백
function CoverageGrid({week, getCount, minM, maxM, selDay, onDayClick}) {
  if (minM >= maxM) return (
    <div style={{background:"#0F172A",borderRadius:8,padding:12,textAlign:"center"}}>
      <span style={{color:"#475569",fontFamily:"sans-serif",fontSize:11}}>근무 데이터 없음</span>
    </div>
  );

  const slots = [];
  for (let m = minM; m < maxM; m += 60) slots.push(m);
  const fmtH = m => `${String(Math.floor(m/60)).padStart(2,"0")}:00`;

  // 셀 최대값 (색 농도 기준)
  const allCounts = [];
  slots.forEach(m => week.forEach(d => { const r=getCount(d.date,m); allCounts.push(r.count); }));
  const maxCount = Math.max(...allCounts, 1);

  const TH = {fontFamily:"sans-serif",fontSize:10,fontWeight:700,color:"#64748B",textAlign:"center",padding:"4px 3px",whiteSpace:"nowrap",borderBottom:"1px solid #334155"};

  return (
    <div style={{overflowX:"auto",borderRadius:8,border:"1px solid #1E293B"}}>
      <table style={{borderCollapse:"collapse",width:"100%",tableLayout:"fixed"}}>
        <colgroup>
          <col style={{width:40}}/>
          {week.map(d => <col key={d.date} style={{width: selDay===d.date ? 100 : 44}}/>)}
          <col style={{width:28}}/>
        </colgroup>
        <thead>
          <tr style={{background:"#1A2535"}}>
            <th style={{...TH,textAlign:"left",paddingLeft:6,color:"#475569",fontSize:9}}>시간</th>
            {week.map(day => {
              const wk  = ["토","일"].includes(day.label);
              const sel = selDay === day.date;
              return (
                <th key={day.date} onClick={()=>onDayClick&&onDayClick(day.date)}
                  style={{...TH,
                    color: sel?"#F59E0B": wk?"#F87171":"#64748B",
                    borderBottom: sel?"2px solid #F59E0B":"1px solid #334155",
                    cursor: onDayClick?"pointer":"default",
                    background: sel?"rgba(245,158,11,.08)":"transparent",
                  }}>
                  {day.label}
                  {sel && <div style={{fontSize:8,color:"#F59E0B88",fontWeight:400}}>{day.date.slice(5)}</div>}
                </th>
              );
            })}
            <th style={{...TH,color:"#F59E0B",fontSize:9}}>↑</th>
          </tr>
        </thead>
        <tbody>
          {slots.map((m, ri) => {
            const rowData = week.map(d => getCount(d.date, m));
            const rowMax  = Math.max(...rowData.map(r=>r.count), 0);
            return (
              <tr key={m} style={{background:ri%2===0?"#0A0F18":"#0D1420"}}>
                <td style={{padding:"0 6px",fontFamily:"sans-serif",fontSize:9,color:"#475569",whiteSpace:"nowrap",borderRight:"1px solid #1E293B"}}>
                  {fmtH(m)}<span style={{color:"#334155"}}>~{fmtH(m+60)}</span>
                </td>
                {rowData.map((slot, di) => {
                  const day = week[di];
                  const sel = selDay === day.date;
                  const c   = slot.color || "#64748B";
                  const alpha = slot.count > 0 ? Math.round(30 + (slot.count/maxCount)*55) : 0;
                  const bgHex = slot.count > 0 ? c + alpha.toString(16).padStart(2,"0") : "transparent";
                  return (
                    <td key={di} style={{
                      background: bgHex,
                      border: "1px solid " + (slot.count>0 ? c+"44" : "#1A2535"),
                      padding: sel ? "2px 3px" : "1px",
                      textAlign:"center", verticalAlign:"top",
                      minHeight: 24,
                    }}>
                      {slot.count > 0 && (
                        <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:0}}>
                          <span style={{color:c,fontWeight:800,fontFamily:"sans-serif",fontSize:12,lineHeight:1.3}}>{slot.count}</span>
                          {sel && (slot.names||[]).map((n,ni)=>(
                            <span key={ni} style={{
                              color: n.color, fontSize:8, fontFamily:"sans-serif", fontWeight:600,
                              whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis",
                              maxWidth:94, display:"block", lineHeight:1.4,
                            }}>{n.name}</span>
                          ))}
                        </div>
                      )}
                    </td>
                  );
                })}
                <td style={{textAlign:"center",borderLeft:"1px solid #1E293B",padding:"1px 3px"}}>
                  <span style={{color:rowMax>0?"#F59E0B":"#334155",fontWeight:700,fontFamily:"sans-serif",fontSize:11}}>{rowMax||""}</span>
                </td>
              </tr>
            );
          })}
        </tbody>
      </table>
    </div>
  );
}

// ── Schedule Tab ──────────────────────────────────────────────────────────────
function SchedTab({data, upd}) {
  const [modal, setModal] = useState(null);
  const [msg, setMsg] = useState("");
  const [selDay, setSelDay] = useState(null); // 커버리지 강조 요일
  const week = A(data.week); const emps = A(data.employees);
  const sched = O(data.sched); const confirmed = O(data.confirmedScheds);
  const reqs  = A(data.reqs);
  const weekId = week[0]?.date || ""; const isConf = !!confirmed[weekId];

  // 승인된 휴무를 sched에 오버레이한 실제 표시용 셀 반환
  function getDisplayCell(eid, date) {
    const base = getCell(sched, eid, date);
    if (base.off || base.locked) return base; // 이미 off 또는 고정이면 그대로
    // 승인된 종일 휴무
    const approvedAllDay = reqs.find(r => r.empId===eid && r.date===date && r.status==="approved" && r.allDay);
    if (approvedAllDay) return {...base, start:"", end:"", brk:0, off:true, _fromReq:true};
    // 승인된 시간 휴무 (셀이 비어있을 때만 반영)
    const approvedTime = reqs.find(r => r.empId===eid && r.date===date && r.status==="approved" && !r.allDay);
    if (approvedTime && !base.start) return {...base, start:approvedTime.start, end:approvedTime.end, brk:0, _fromReq:true};
    return base;
  }

  function setCell(eid, date, val) { upd("sched", {...sched, [eid+"__"+date]: val}); }
  function empTotal(eid) { return week.reduce((s,d) => s + calcH(getDisplayCell(eid,d.date)), 0); }
  function dayTotal(date) { return emps.reduce((s,e) => s + calcH(getDisplayCell(e.id,date)), 0); }

  function autoGen() {
    const MAX_H = 15;

    // locked 셀 + 직접 설정된 off 셀 모두 유지
    const ns = {};
    Object.entries(sched).forEach(([k,v]) => { if (v.locked || v.off) ns[k] = v; });

    // 누적 근무시간 초기화 (locked 포함)
    const th = {};
    emps.forEach(e => { th[e.id] = 0; });
    emps.forEach(e => {
      week.forEach(d => {
        const c = getCell(ns, e.id, d.date);
        if (!c.off && c.start && c.end) th[e.id] += calcH(c);
      });
    });

    const approvedReqs = A(data.reqs).filter(r => r.status==="approved");
    // 승인된 종일 휴무 + sched off + 고정 휴무 = 해당 날짜 배정 불가
    const isBusy = (e, date) => {
      const dow = new Date(date).getDay(); // 0=일~6=토
      if (A(e.fixedOff).includes(dow)) return true;
      if (approvedReqs.some(r => r.empId===e.id && r.date===date && r.allDay)) return true;
      if (getCell(ns, e.id, date).off) return true;
      return false;
    };
    const isAssigned = (e, date) => { const c=getCell(ns,e.id,date); return !!(c.start||c.off||c.locked); };
    const byHour = (a, b) => th[a.id] - th[b.id];

    for (const d of week) {
      const shifts = A(d.shifts);

      // 스킬 조건이 까다로운 shift부터 먼저 처리
      const sortedShifts = [...shifts].sort((a, b) => {
        const free = e => !isAssigned(e,d.date) && !isBusy(e,d.date);
        const qA = emps.filter(e => free(e) && empCanWork(e, A(a.reqSkills))).length;
        const qB = emps.filter(e => free(e) && empCanWork(e, A(b.reqSkills))).length;
        return qA - qB;
      });

      for (const sh of sortedShifts) {
        const shH    = calcH({start:sh.start, end:sh.end, brk:sh.brk||0});
        const needed = sh.minStaff || 1;
        const locked = emps.filter(e => { const c=getCell(ns,e.id,d.date); return c.locked && c.start===sh.start && c.end===sh.end; }).length;
        const toAssign = Math.max(0, needed - locked);
        if (toAssign <= 0) continue;

        const avail = emps.filter(e => !isAssigned(e,d.date) && !isBusy(e,d.date));

        // 4단계 우선순위: 스킬O+15h미달 → 스킬O+초과 → 스킬X+15h미달 → 스킬X+초과
        const can   = e => empCanWork(e, A(sh.reqSkills));
        const under = e => th[e.id] + shH <= MAX_H;
        const p1 = avail.filter(e =>  can(e) &&  under(e)).sort(byHour);
        const p2 = avail.filter(e =>  can(e) && !under(e)).sort(byHour);
        const p3 = avail.filter(e => !can(e) &&  under(e)).sort(byHour);
        const p4 = avail.filter(e => !can(e) && !under(e)).sort(byHour);

        [...p1, ...p2, ...p3, ...p4].slice(0, toAssign).forEach(e => {
          const isSub = !empCanWork(e, A(sh.reqSkills));
          ns[e.id+"__"+d.date] = {start:sh.start, end:sh.end, brk:sh.brk||0, off:false, locked:false, substitute:isSub};
          th[e.id] += shH;
        });
      }
    }
    upd("sched", ns);
  }

  function confirm() {
    upd("confirmedScheds", {...confirmed, [weekId]: JSON.parse(JSON.stringify(sched))});
    setMsg("✅ 직원에게 공개됐습니다"); setTimeout(() => setMsg(""), 3000);
  }

  const TH = {border:"1px solid #475569",padding:"4px 6px",textAlign:"center",fontFamily:"sans-serif",fontSize:10,fontWeight:700,color:"#94A3B8",whiteSpace:"nowrap",background:"#1E293B"};

  return (
    <div>
      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",flexWrap:"wrap",gap:10,marginBottom:14}}>
        <div>
          <h2 style={{color:"#E2E8F0",fontFamily:"sans-serif",fontWeight:700,margin:0,fontSize:18}}>주간 스케줄</h2>
          <p style={{color:"#64748B",fontSize:12,fontFamily:"sans-serif",margin:"2px 0 0"}}>{week[0]?.date} ~ {week[6]?.date}</p>
        </div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          <button onClick={() => upd("sched",{})} style={{...S.btnG,fontSize:11}}>🗑 초기화</button>
          <button onClick={autoGen} style={S.btnA}>✨ 자동 생성</button>
          <button onClick={confirm} style={{...S.btnA, background:isConf?"linear-gradient(135deg,#10B981,#059669)":"linear-gradient(135deg,#3B82F6,#2563EB)"}}>
            {isConf ? "✅ 재확정" : "📌 확정 공개"}
          </button>
        </div>
      </div>
      {msg && <div style={{background:"#D1FAE5",border:"1px solid #A7F3D0",borderRadius:8,padding:10,marginBottom:10}}><p style={{color:"#065F46",fontWeight:700,fontFamily:"sans-serif",fontSize:13,margin:0}}>{msg}</p></div>}
      <div style={{overflowX:"auto",borderRadius:10,border:"1px solid #334155"}}>
        <table style={{borderCollapse:"collapse",minWidth:"max-content"}}>
          <thead>
            <tr>
              <th rowSpan={2} style={{...TH,minWidth:72,position:"sticky",left:0,zIndex:3,borderRight:"2px solid #475569"}}>직원</th>
              {week.map(day => {
                const wk = ["토","일"].includes(day.label);
                return <th key={day.id} colSpan={4} style={{...TH,background:wk?"#2D1A0A":"#1E293B",color:wk?"#F87171":"#94A3B8",padding:"5px 6px"}}>{day.label} {day.date.slice(5)}</th>;
              })}
              <th rowSpan={2} style={{...TH,minWidth:44,color:"#F59E0B",borderLeft:"2px solid #475569"}}>합계</th>
            </tr>
            <tr>
              {week.map(day => {
                const wk = ["토","일"].includes(day.label);
                const sub = {...TH, background:wk?"#2D1A0A":"#162030", fontSize:9, padding:"2px 4px", color:"#64748B"};
                return (
                  <th key={day.id+"_s"} style={{display:"contents"}}>
                    <th style={{...sub,minWidth:40}}>출근</th>
                    <th style={{...sub,minWidth:40}}>퇴근</th>
                    <th style={{...sub,minWidth:26}}>휴식</th>
                    <th style={{...sub,minWidth:30,color:"#F59E0B"}}>시간</th>
                  </th>
                );
              })}
            </tr>
          </thead>
          <tbody>
            {emps.map((emp, ei) => {
              const tot = empTotal(emp.id); const over = tot >= 15;
              return (
                <tr key={emp.id} style={{background:ei%2===0?"#0A0F18":"#0D1420"}}>
                  <td style={{background:ei%2===0?"#1A2535":"#1E293B",border:"1px solid #2D3748",borderRight:"2px solid #475569",padding:"4px 10px",position:"sticky",left:0,zIndex:1}}>
                    <span style={{color:emp.color,fontWeight:700,fontFamily:"sans-serif",fontSize:12,whiteSpace:"nowrap"}}>{emp.role==="manager"?"⭐ ":""}{emp.name}</span>
                  </td>
                  {week.map(day => {
                    const cell = getDisplayCell(emp.id, day.date); const h = calcH(cell);
                    const wk = ["토","일"].includes(day.label);
                    const isSub = cell.substitute && !cell.locked;
                    const bg = cell.off
                      ? "rgba(245,158,11,.22)"
                      : isSub
                      ? "rgba(239,68,68,.18)"
                      : wk ? "rgba(239,68,68,.04)" : "transparent";
                    const td = {background:bg,border:"1px solid "+(isSub?"#F8717155":"#2D3748"),padding:"3px 5px",textAlign:"center",fontSize:11,fontFamily:"sans-serif",cursor:"pointer",whiteSpace:"nowrap"};
                    const click = () => setModal({emp, day, cell:{...cell}});
                    if (cell.off) return (
                      <th key={day.id} style={{display:"contents"}}>
                        <td style={{...td,color:"#F59E0B",fontWeight:700,fontSize:10}} onClick={click}>휴무</td>
                        <td style={td} onClick={click}></td><td style={td} onClick={click}></td><td style={td} onClick={click}></td>
                      </th>
                    );
                    return (
                      <th key={day.id} style={{display:"contents"}}>
                        <td style={{...td,color:isSub?"#F87171":"#CBD5E1",position:"relative"}} onClick={click}>
                          {cell.locked && <span style={{position:"absolute",top:1,left:2,fontSize:7,color:"#F59E0B"}}>🔒</span>}
                          {isSub       && <span style={{position:"absolute",top:0,left:1,fontSize:8,color:"#F87171",fontWeight:700,lineHeight:1}}>대체</span>}
                          <span style={{display:"block",marginTop:isSub?10:0}}>{cell.start||<span style={{color:"#2D3748"}}>-</span>}</span>
                        </td>
                        <td style={{...td,color:isSub?"#F87171":"#CBD5E1"}} onClick={click}>{cell.end||<span style={{color:"#2D3748"}}>-</span>}</td>
                        <td style={{...td,color:"#CBD5E1"}} onClick={click}>{cell.brk||""}</td>
                        <td style={{...td,color:h>0?"#F59E0B":"#2D3748",fontWeight:h>0?700:400,cursor:"default"}}>{h||""}</td>
                      </th>
                    );
                  })}
                  <td style={{background:over?"rgba(239,68,68,.15)":"#1A2535",border:"1px solid #2D3748",borderLeft:"2px solid #475569",padding:"4px 8px",textAlign:"center"}}>
                    <span style={{color:over?"#EF4444":"#F59E0B",fontWeight:700,fontFamily:"sans-serif",fontSize:12}}>{tot>0?tot+"h":""}{over?" ⚠":""}</span>
                  </td>
                </tr>
              );
            })}
            <tr style={{borderTop:"2px solid #475569"}}>
              <td style={{background:"#1E293B",border:"1px solid #475569",borderRight:"2px solid #475569",padding:"4px 10px",position:"sticky",left:0,zIndex:1}}>
                <span style={{color:"#F59E0B",fontWeight:700,fontFamily:"sans-serif",fontSize:11}}>일별 합계</span>
              </td>
              {week.map(day => {
                const tot = dayTotal(day.date);
                return (
                  <th key={day.id} style={{display:"contents"}}>
                    <td style={{border:"1px solid #334155",background:"#1A2535"}}></td>
                    <td style={{border:"1px solid #334155",background:"#1A2535"}}></td>
                    <td style={{border:"1px solid #334155",background:"#1A2535"}}></td>
                    <td style={{border:"1px solid #334155",background:"#1A2535",textAlign:"center"}}>
                      <span style={{color:"#94A3B8",fontFamily:"sans-serif",fontSize:11,fontWeight:700}}>{tot>0?tot+"h":""}</span>
                    </td>
                  </th>
                );
              })}
              <td style={{background:"#1A2535",border:"1px solid #475569",borderLeft:"2px solid #475569",padding:"4px 8px",textAlign:"center"}}>
                <span style={{color:"#94A3B8",fontFamily:"sans-serif",fontSize:11,fontWeight:700}}>{emps.reduce((s,e)=>s+empTotal(e.id),0)||""}h</span>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
      {modal && <CellModal emp={modal.emp} day={modal.day} initCell={modal.cell} onSave={val=>{setCell(modal.emp.id,modal.day.date,val);setModal(null);}} onClose={()=>setModal(null)}/>}

      {/* ── 커버리지 그리드 (스케줄 기반) ── */}
      {(()=>{
        let minM=24*60, maxM=0;
        week.forEach(d=>{
          const dayShifts=A((data.week||[]).find(w=>w.date===d.date)?.shifts);
          dayShifts.forEach(sh=>{ if(sh.start)minM=Math.min(minM,toM(sh.start)); if(sh.end)maxM=Math.max(maxM,toM(sh.end)); });
          emps.forEach(e=>{ const c=getDisplayCell(e.id,d.date); if(c.start&&!c.off){minM=Math.min(minM,toM(c.start));maxM=Math.max(maxM,toM(c.end));} });
        });
        if(minM>=maxM) return null;
        function getCount(date, m) {
          const dayObj=(data.week||[]).find(w=>w.date===date);
          const sh=A(dayObj?.shifts).find(s=>toM(s.start)<=m&&toM(s.end)>m);
          const active=emps.filter(e=>{ const c=getDisplayCell(e.id,date); return !c.off&&c.start&&toM(c.start)<=m&&toM(c.end)>m; });
          return {count:active.length, color:sh?.color||"#64748B", names:active.map(e=>({name:e.name,color:e.color}))};
        }
        return (
          <div style={{marginTop:16}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
              <p style={{color:"#64748B",fontSize:11,fontFamily:"sans-serif",fontWeight:700,margin:0}}>📊 커버리지</p>
              <p style={{color:"#475569",fontSize:10,fontFamily:"sans-serif",margin:0}}>— 요일 클릭 시 이름 표시{selDay?" (클릭해서 숨기기)":""}</p>
            </div>
            <CoverageGrid week={week} getCount={getCount} minM={minM} maxM={maxM}
              selDay={selDay} onDayClick={d=>setSelDay(selDay===d?null:d)}/>
          </div>
        );
      })()}
    </div>
  );
}

function CellModal({emp, day, initCell, onSave, onClose}) {
  const [start, setStart] = useState(initCell.start||"");
  const [end,   setEnd]   = useState(initCell.end||"");
  const [brk,   setBrk]   = useState(initCell.brk||0);
  const [off,   setOff]   = useState(!!initCell.off);
  const [locked,setLocked]= useState(!!initCell.locked);
  const h = off ? 0 : calcH({start, end, brk});
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.6)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,padding:16}}>
      <div style={{...S.card,width:"100%",maxWidth:300,margin:0}}>
        <div style={{display:"flex",alignItems:"center",marginBottom:14}}>
          <span style={{color:emp.color,fontWeight:700,fontFamily:"sans-serif",fontSize:14,flex:1}}>{emp.name} — {day.label} {day.date.slice(5)}</span>
          <button onClick={onClose} style={{background:"none",border:"none",color:"#64748B",fontSize:20,cursor:"pointer",padding:0}}>✕</button>
        </div>
        <label style={{display:"flex",alignItems:"center",gap:8,marginBottom:10,cursor:"pointer"}}>
          <input type="checkbox" checked={off} onChange={e=>setOff(e.target.checked)}/>
          <span style={{color:"#F59E0B",fontFamily:"sans-serif",fontSize:13,fontWeight:700}}>종일 휴무</span>
        </label>
        {!off && (
          <>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
              <div><label style={S.lbl}>출근</label><input type="time" value={start} onChange={e=>setStart(e.target.value)} style={S.inp}/></div>
              <div><label style={S.lbl}>퇴근</label><input type="time" value={end}   onChange={e=>setEnd(e.target.value)}   style={S.inp}/></div>
              <div>
                <label style={S.lbl}>휴식(h)</label>
                <select value={brk} onChange={e=>setBrk(Number(e.target.value))} style={S.inp}>
                  {[0,0.5,1,1.5].map(v => <option key={v} value={v}>{v}</option>)}
                </select>
              </div>
              {h>0 && <div style={{display:"flex",alignItems:"flex-end",paddingBottom:4}}><span style={{color:"#F59E0B",fontWeight:800,fontFamily:"sans-serif",fontSize:22}}>{h}h</span></div>}
            </div>
            <label style={{display:"flex",alignItems:"center",gap:8,marginBottom:12,cursor:"pointer",background:locked?"rgba(245,158,11,.1)":"#0F172A",border:"1px solid "+(locked?"#F59E0B44":"#334155"),borderRadius:8,padding:"8px 12px"}}>
              <input type="checkbox" checked={locked} onChange={e=>setLocked(e.target.checked)}/>
              <span style={{color:locked?"#F59E0B":"#64748B",fontFamily:"sans-serif",fontSize:12,fontWeight:700}}>🔒 자동 생성에서 고정 (이 직원 이 시간 유지)</span>
            </label>
          </>
        )}
        <div style={{display:"flex",gap:8,justifyContent:"space-between"}}>
          <button onClick={()=>onSave({start:"",end:"",brk:0,off:false,locked:false})} style={{...S.btnG,color:"#EF4444",fontSize:11}}>초기화</button>
          <div style={{display:"flex",gap:8}}>
            <button onClick={onClose} style={S.btnG}>취소</button>
            <button onClick={()=>onSave(off ? {start:"",end:"",brk:0,off:true,locked:false} : {start,end,brk,off:false,locked})} style={S.btnA}>저장</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Timetable Tab ─────────────────────────────────────────────────────────────
function TimeTab({data, upd}) {
  const [open,     setOpen]     = useState(null);
  const [copyFrom, setCopyFrom] = useState(null);
  const [copyTo,   setCopyTo]   = useState([]);
  const week   = A(data.week);
  const skills = A(data.skills);

  function setFirst(nd) {
    upd("week", Array.from({length:7}, (_,i) => {
      const ds = i===0 ? nd : plusDays(nd,i); const old = week[i]||{};
      return {...old, id:"d"+i, label:dayLbl(ds), date:ds, shifts:A(old.shifts)};
    }));
  }
  function updShift(di, si, p) {
    upd("week", week.map((d,i) => i!==di ? d : {...d, shifts:A(d.shifts).map((sh,j) => j!==si ? sh : {...sh,...p})}));
  }
  function addShift(di) {
    upd("week", week.map((d,i) => i!==di ? d : {...d, shifts:[...A(d.shifts),{id:uid(),name:"새 근무",start:"09:00",end:"14:00",color:"#F59E0B",minStaff:1,reqSkills:[]}]}));
  }
  function delShift(di, si) {
    upd("week", week.map((d,i) => i!==di ? d : {...d, shifts:A(d.shifts).filter((_,j) => j!==si)}));
  }
  function doCopy() {
    if (copyFrom===null || !copyTo.length) return;
    const src = week[copyFrom];
    upd("week", week.map((d,i) => copyTo.includes(i) ? {...d, shifts:A(src.shifts).map(sh=>({...sh,id:uid()}))} : d));
    setCopyFrom(null); setCopyTo([]);
  }
  function addReq(di, si, skillId) {
    const sh = week[di].shifts[si];
    if (A(sh.reqSkills).some(r => r.skillId===skillId)) return;
    updShift(di, si, {reqSkills:[...A(sh.reqSkills), {skillId, minLevel:1}]});
  }
  function rmReq(di, si, skillId) {
    updShift(di, si, {reqSkills:A(week[di].shifts[si].reqSkills).filter(r => r.skillId!==skillId)});
  }
  function setReqLv(di, si, skillId, lv) {
    updShift(di, si, {reqSkills:A(week[di].shifts[si].reqSkills).map(r => r.skillId===skillId ? {...r,minLevel:lv} : r)});
  }

  // ── 커버리지 차트 계산 ──
  // 각 시간대(30분 단위)에 어떤 shift가 겹치는지
  function buildChart(day) {
    const shifts = A(day.shifts);
    if (!shifts.length) return [];
    const allMins = shifts.flatMap(sh => [toM(sh.start), toM(sh.end)]).filter(Boolean);
    const minH = Math.min(...allMins), maxH = Math.max(...allMins);
    const slots = [];
    for (let m = minH; m < maxH; m += 30) {
      const label = `${String(Math.floor(m/60)).padStart(2,"0")}:${m%60===0?"00":"30"}`;
      const active = shifts.filter(sh => toM(sh.start) <= m && toM(sh.end) > m);
      slots.push({label, m, active});
    }
    return slots;
  }

  const SCOLS = ["#F59E0B","#38BDF8","#A78BFA","#10B981","#F87171","#FB923C"];

  return (
    <div>
      {/* 헤더 */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10,marginBottom:14}}>
        <div>
          <h2 style={{color:"#E2E8F0",fontFamily:"sans-serif",fontWeight:700,margin:0,fontSize:18}}>타임테이블</h2>
          <p style={{color:"#64748B",fontSize:12,fontFamily:"sans-serif",margin:"2px 0 0"}}>근무별 시간·인원·필요 스킬 → 자동 생성에 반영</p>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
          <input type="date" value={week[0]?.date||""} onChange={e=>setFirst(e.target.value)} style={{...S.inp,width:160}}/>
        </div>
      </div>

      {/* 복사 모달 */}
      {copyFrom!==null && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.6)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,padding:16}}>
          <div style={{...S.card,width:"100%",maxWidth:340,margin:0}}>
            <p style={{color:"#E2E8F0",fontWeight:700,fontFamily:"sans-serif",fontSize:15,margin:"0 0 6px"}}>
              📋 {week[copyFrom]?.label}요일 → 복사할 요일 선택
            </p>
            <p style={{color:"#64748B",fontSize:12,fontFamily:"sans-serif",margin:"0 0 14px"}}>선택한 요일의 근무가 덮어씌워집니다</p>
            <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:16}}>
              {week.map((d,i) => {
                if (i===copyFrom) return null;
                const sel = copyTo.includes(i);
                const wk  = ["토","일"].includes(d.label);
                return (
                  <button key={i} onClick={()=>setCopyTo(sel ? copyTo.filter(x=>x!==i) : [...copyTo,i])}
                    style={{padding:"10px 14px",borderRadius:10,border:"2px solid "+(sel?(wk?"#F87171":"#38BDF8"):"#334155"),background:sel?(wk?"rgba(248,113,113,.15)":"rgba(56,189,248,.15)"):"#0F172A",cursor:"pointer",textAlign:"center"}}>
                    <p style={{color:wk?"#F87171":"#E2E8F0",fontWeight:700,fontFamily:"sans-serif",fontSize:14,margin:0}}>{d.label}</p>
                    <p style={{color:"#64748B",fontSize:10,fontFamily:"sans-serif",margin:"2px 0 0"}}>{d.date.slice(5)}</p>
                  </button>
                );
              })}
            </div>
            <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
              <button onClick={()=>{setCopyFrom(null);setCopyTo([]);}} style={S.btnG}>취소</button>
              <button onClick={doCopy} disabled={!copyTo.length} style={{...S.btnA,opacity:copyTo.length?1:0.4}}>
                복사 ({copyTo.length}개 요일)
              </button>
            </div>
          </div>
        </div>
      )}

      {/* ── 편집 뷰 ── */}
      {week.map((day, di) => {
        const wk = ["토","일"].includes(day.label); const isOpen = open===di;
        const shifts = A(day.shifts);

        // 이 요일의 커버리지 범위
        let ttMinM=24*60, ttMaxM=0;
        shifts.forEach(sh=>{ if(sh.start)ttMinM=Math.min(ttMinM,toM(sh.start)); if(sh.end)ttMaxM=Math.max(ttMaxM,toM(sh.end)); });
        const hasCoverage = ttMinM < ttMaxM;

        function getTTCount(date, m) {
          const active = shifts.filter(sh=>toM(sh.start)<=m&&toM(sh.end)>m);
          const count  = active.reduce((s,sh)=>s+(sh.minStaff||1),0);
          // 여러 shift 혼재 시 첫 번째 색상 사용
          return {count, color: active[0]?.color||"#64748B", names:[]};
        }

        // 이 요일만 week 형태로 래핑
        const singleWeek = [{...day}];

        return (
          <div key={day.id} style={{...S.card,padding:0,overflow:"hidden",marginBottom:8}}>
            <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",cursor:"pointer",borderBottom:isOpen?"1px solid #334155":"none"}} onClick={()=>setOpen(isOpen?null:di)}>
              <span style={{color:wk?"#F87171":"#38BDF8",fontWeight:800,fontSize:16,fontFamily:"sans-serif",minWidth:28}}>{day.label}</span>
              <span style={{color:"#475569",fontSize:12,fontFamily:"sans-serif",flex:1}}>{day.date} · {shifts.length}개 근무</span>
              {!isOpen && shifts.length>0 && (
                <div style={{display:"flex",gap:3}}>
                  {shifts.map(sh=>(
                    <span key={sh.id} style={{background:sh.color+"33",color:sh.color,fontSize:9,fontWeight:700,fontFamily:"sans-serif",padding:"2px 6px",borderRadius:4,whiteSpace:"nowrap"}}>
                      {sh.name} {sh.start}~{sh.end} ×{sh.minStaff||1}
                    </span>
                  ))}
                </div>
              )}
              <button onClick={e=>{e.stopPropagation();setCopyFrom(di);setCopyTo([]);}} style={{...S.btnG,fontSize:11,padding:"3px 10px"}}>📋 복사</button>
              <span style={{color:"#64748B",fontSize:12}}>{isOpen?"▲":"▼"}</span>
            </div>

            {isOpen && (
              <div style={{padding:12}}>
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(250px,1fr))",gap:8,marginBottom:hasCoverage?16:0}}>
                  {shifts.map((sh, si) => {
                    const reqSkills = A(sh.reqSkills);
                    return (
                      <div key={sh.id} style={{background:"#0F172A",borderRadius:10,border:"1.5px solid "+sh.color+"55",padding:10}}>
                        <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8}}>
                          <div style={{width:8,height:8,borderRadius:99,background:sh.color,flexShrink:0}}/>
                          <input value={sh.name} onChange={e=>updShift(di,si,{name:e.target.value})} style={{...S.inp,flex:1,padding:"3px 8px",fontSize:12,background:"transparent",border:"none",color:sh.color,fontWeight:700}}/>
                          <button onClick={()=>delShift(di,si)} style={{background:"none",border:"none",color:"#475569",cursor:"pointer",fontSize:13,padding:0}}>✕</button>
                        </div>
                        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:8}}>
                          <div><label style={S.lbl}>시작</label><input type="time" value={sh.start} onChange={e=>updShift(di,si,{start:e.target.value})} style={S.inp}/></div>
                          <div><label style={S.lbl}>종료</label><input type="time" value={sh.end}   onChange={e=>updShift(di,si,{end:e.target.value})}   style={S.inp}/></div>
                          <div>
                            <label style={S.lbl}>휴식 (h)</label>
                            <select value={sh.brk||0} onChange={e=>updShift(di,si,{brk:Number(e.target.value)})} style={S.inp}>
                              {[0,0.5,1,1.5,2].map(v=><option key={v} value={v}>{v===0?"없음":v+"h"}</option>)}
                            </select>
                          </div>
                          <div style={{display:"flex",alignItems:"flex-end",paddingBottom:2}}>
                            <span style={{color:"#475569",fontSize:11,fontFamily:"sans-serif"}}>실근무 <span style={{color:"#F59E0B",fontWeight:700}}>{calcH({start:sh.start,end:sh.end,brk:sh.brk||0})}h</span></span>
                          </div>
                        </div>
                        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                          <span style={S.lbl}>최소 인원</span>
                          <button onClick={()=>updShift(di,si,{minStaff:Math.max(1,(sh.minStaff||1)-1)})} style={{background:"#1E293B",border:"1px solid #334155",color:"#94A3B8",fontFamily:"sans-serif",fontSize:14,padding:"2px 9px",borderRadius:5,cursor:"pointer"}}>−</button>
                          <span style={{color:"#E2E8F0",fontWeight:700,fontFamily:"sans-serif",minWidth:16,textAlign:"center"}}>{sh.minStaff||1}</span>
                          <button onClick={()=>updShift(di,si,{minStaff:(sh.minStaff||1)+1})} style={{background:"#1E293B",border:"1px solid #334155",color:"#94A3B8",fontFamily:"sans-serif",fontSize:14,padding:"2px 9px",borderRadius:5,cursor:"pointer"}}>+</button>
                          <div style={{marginLeft:"auto",display:"flex",gap:4}}>
                            {SCOLS.map(c => <button key={c} onClick={()=>updShift(di,si,{color:c})} style={{width:16,height:16,borderRadius:99,background:c,border:sh.color===c?"2px solid #fff":"2px solid transparent",cursor:"pointer",padding:0}}/>)}
                          </div>
                        </div>
                        <label style={S.lbl}>필요 스킬</label>
                        {reqSkills.map(req => {
                          const sk = skills.find(s=>s.id===req.skillId); if (!sk) return null;
                          return (
                            <div key={req.skillId} style={{display:"flex",alignItems:"center",gap:6,background:"#1E293B",borderRadius:6,padding:"4px 8px",marginBottom:3}}>
                              <span style={{color:"#CBD5E1",fontSize:11,fontFamily:"sans-serif",flex:1}}>{sk.name}</span>
                              <select value={req.minLevel} onChange={e=>setReqLv(di,si,req.skillId,Number(e.target.value))} style={{...S.inp,width:80,padding:"3px 6px",fontSize:10}}>
                                {[1,2,3,4].map(lv => <option key={lv} value={lv}>{EXP[lv]}</option>)}
                              </select>
                              <button onClick={()=>rmReq(di,si,req.skillId)} style={{background:"none",border:"none",color:"#EF4444",cursor:"pointer",fontSize:13,padding:0}}>✕</button>
                            </div>
                          );
                        })}
                        <div style={{display:"flex",gap:4,flexWrap:"wrap",marginTop:4}}>
                          {skills.filter(sk=>!reqSkills.some(r=>r.skillId===sk.id)).map(sk => (
                            <button key={sk.id} onClick={()=>addReq(di,si,sk.id)} style={{background:"#1E293B",border:"1px dashed #334155",borderRadius:5,padding:"2px 8px",color:"#64748B",fontSize:10,cursor:"pointer",fontFamily:"sans-serif"}}>+ {sk.name}</button>
                          ))}
                        </div>
                      </div>
                    );
                  })}
                  <button onClick={()=>addShift(di)} style={{border:"2px dashed #334155",borderRadius:10,padding:16,background:"none",color:"#475569",fontFamily:"sans-serif",fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",minHeight:60}}>
                    + 근무 추가
                  </button>
                </div>

                {/* ── 인라인 커버리지 (컴팩트) ── */}
                {hasCoverage && (
                  <div style={{borderTop:"1px solid #1E293B",paddingTop:10}}>
                    <p style={{color:"#64748B",fontSize:10,fontFamily:"sans-serif",fontWeight:700,margin:"0 0 6px"}}>📊 시간대별 필요 인원</p>
                    <CoverageGrid
                      week={singleWeek}
                      getCount={getTTCount}
                      minM={ttMinM} maxM={ttMaxM}
                      selDay={null} onDayClick={null}
                    />
                  </div>
                )}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ── Employees Tab ─────────────────────────────────────────────────────────────
function EmpTab({data, upd}) {
  const [exp, setExp] = useState(null);
  const [nn, setNn] = useState(""); const [np, setNp] = useState("");
  const emps = A(data.employees); const skills = A(data.skills);

  function add() {
    if (!nn.trim()) return;
    upd("employees", [...emps, {id:Date.now(), name:nn.trim(), pin:np||String(emps.length+1).padStart(4,"0"), color:COLS[emps.length%COLS.length], skills:{}, role:"staff"}]);
    setNn(""); setNp("");
  }
  function upE(id, p) { upd("employees", emps.map(e => e.id===id ? {...e,...p} : e)); }
  function del(id)    { upd("employees", emps.filter(e => e.id!==id)); }
  function move(idx, dir) {
    const ni = idx + dir;
    if (ni < 0 || ni >= emps.length) return;
    const arr = [...emps];
    [arr[idx], arr[ni]] = [arr[ni], arr[idx]];
    upd("employees", arr);
  }

  return (
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10,marginBottom:14}}>
        <h2 style={{color:"#E2E8F0",fontFamily:"sans-serif",fontWeight:700,margin:0,fontSize:18}}>직원 ({emps.length}명)</h2>
        <div style={{display:"flex",gap:8}}>
          <input placeholder="이름" value={nn} onChange={e=>setNn(e.target.value)} onKeyDown={e=>e.key==="Enter"&&add()} style={{...S.inp,width:90}}/>
          <input placeholder="PIN" value={np} onChange={e=>setNp(e.target.value)} maxLength={6} style={{...S.inp,width:80}}/>
          <button onClick={add} style={S.btnA}>+ 추가</button>
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(340px,1fr))",gap:8}}>
        {emps.map((emp, idx) => (
          <div key={emp.id} style={{...S.card,padding:0,overflow:"hidden",border:"1px solid "+emp.color+"44"}}>
            <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",cursor:"pointer"}} onClick={()=>setExp(exp===emp.id?null:emp.id)}>
              {/* 순서 버튼 */}
              <div style={{display:"flex",flexDirection:"column",gap:2,flexShrink:0}} onClick={e=>e.stopPropagation()}>
                <button onClick={()=>move(idx,-1)} disabled={idx===0} style={{background:"none",border:"1px solid #334155",borderRadius:4,color:idx===0?"#334155":"#94A3B8",fontSize:10,padding:"1px 5px",cursor:idx===0?"default":"pointer",lineHeight:1}}>▲</button>
                <button onClick={()=>move(idx,+1)} disabled={idx===emps.length-1} style={{background:"none",border:"1px solid #334155",borderRadius:4,color:idx===emps.length-1?"#334155":"#94A3B8",fontSize:10,padding:"1px 5px",cursor:idx===emps.length-1?"default":"pointer",lineHeight:1}}>▼</button>
              </div>
              <div style={{width:34,height:34,borderRadius:8,background:emp.color+"22",display:"flex",alignItems:"center",justifyContent:"center",color:emp.color,fontWeight:800,fontSize:15,fontFamily:"sans-serif",flexShrink:0}}>{emp.name[0]}</div>
              <div style={{flex:1}}>
                <span style={{color:emp.color,fontWeight:700,fontSize:13,fontFamily:"sans-serif"}}>{emp.name}</span>
                {emp.role==="manager" && <span style={{background:"rgba(168,85,247,.2)",color:"#A78BFA",borderRadius:99,padding:"1px 7px",fontSize:10,marginLeft:6,fontFamily:"sans-serif"}}>매니저</span>}
                <p style={{color:"#64748B",fontSize:11,fontFamily:"sans-serif",margin:"1px 0 0"}}>PIN: {emp.pin}</p>
              </div>
              <button onClick={e=>{e.stopPropagation();del(emp.id);}} style={{...S.btnG,color:"#EF4444",fontSize:11,padding:"2px 8px"}}>삭제</button>
              <span style={{color:"#64748B"}}>{exp===emp.id?"▲":"▼"}</span>
            </div>
            {exp===emp.id && (
              <div style={{borderTop:"1px solid "+emp.color+"33",padding:14}}>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:12}}>
                  <div><label style={S.lbl}>이름</label><input value={emp.name} onChange={e=>upE(emp.id,{name:e.target.value})} style={S.inp}/></div>
                  <div><label style={S.lbl}>PIN</label><input value={emp.pin} onChange={e=>upE(emp.id,{pin:e.target.value})} style={S.inp}/></div>
                  <div><label style={S.lbl}>직급</label>
                    <select value={emp.role||"staff"} onChange={e=>upE(emp.id,{role:e.target.value})} style={S.inp}>
                      <option value="staff">일반</option><option value="manager">매니저</option>
                    </select>
                  </div>
                </div>
                <label style={S.lbl}>스킬 수준</label>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginTop:6}}>
                  {skills.map(sk => {
                    const lv = O(emp.skills)[sk.id]||0;
                    return (
                      <div key={sk.id} style={{background:"#0F172A",borderRadius:8,padding:"8px 10px",border:"1px solid #334155"}}>
                        <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
