                        </div>
                        <input type="range" min={0} max={4} value={lv} onChange={e=>upE(emp.id,{skills:{...O(emp.skills),[sk.id]:Number(e.target.value)}})} style={{width:"100%",accentColor:EXP_C[lv]}}/>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

// ── Training Tab ──────────────────────────────────────────────────────────────
function TrainTab({data, upd}) {
  const [selEmp, setSelEmp] = useState(null); // 선택된 직원 id
  const [view, setView] = useState("people"); // "people" | "items"
  const [newName, setNewName] = useState(""); const [newCat, setNewCat] = useState("");
  const emps = A(data.employees); const items = A(data.trainItems); const prog = O(data.trainProgress);
  const cats = [...new Set(items.map(t => t.cat))];

  function getProg(eid, iid) { return prog[eid+"_"+iid] || "pending"; }
  function cycle(eid, iid) {
    const c = getProg(eid, iid);
    upd("trainProgress", {...prog, [eid+"_"+iid]: {pending:"progress",progress:"done",done:"pending"}[c]});
  }
  function addItem() {
    if (!newName.trim()) return;
    upd("trainItems", [...items, {id:"t"+uid(), cat:newCat||"기본", name:newName.trim()}]);
    setNewName(""); setNewCat("");
  }
  function delItem(id) { upd("trainItems", items.filter(t => t.id!==id)); }

  const ST = {done:{label:"완료",bg:"#10B981",icon:"✓"}, progress:{label:"진행중",bg:"#F59E0B",icon:"●"}, pending:{label:"미진행",bg:"#334155",icon:""}};

  return (
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10,marginBottom:14}}>
        <h2 style={{color:"#E2E8F0",fontFamily:"sans-serif",fontWeight:700,margin:0,fontSize:18}}>인수인계 현황</h2>
        <div style={{display:"flex",gap:6}}>
          <button onClick={()=>{setView("people");setSelEmp(null);}} style={{...S.btnG,...(view==="people"?{color:"#38BDF8",borderColor:"rgba(29,78,216,.3)"}:{})}}>👥 직원별</button>
          <button onClick={()=>setView("items")} style={{...S.btnG,...(view==="items"?{color:"#38BDF8",borderColor:"rgba(29,78,216,.3)"}:{})}}>⚙️ 항목 관리</button>
        </div>
      </div>

      {/* ── 직원별 뷰 ── */}
      {view==="people" && !selEmp && (
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:8}}>
          {emps.map(emp => {
            const done = items.filter(t => getProg(emp.id,t.id)==="done").length;
            const pct = items.length > 0 ? Math.round(done/items.length*100) : 0;
            return (
              <button key={emp.id} onClick={()=>setSelEmp(emp.id)}
                style={{...S.card,cursor:"pointer",textAlign:"left",padding:"14px 16px",border:"1px solid "+emp.color+"44",background:"#1E293B"}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                  <div style={{width:32,height:32,borderRadius:8,background:emp.color+"22",display:"flex",alignItems:"center",justifyContent:"center",color:emp.color,fontWeight:800,fontSize:14,fontFamily:"sans-serif",flexShrink:0}}>{emp.name[0]}</div>
                  <span style={{color:emp.color,fontWeight:700,fontFamily:"sans-serif",fontSize:13}}>{emp.name}</span>
                </div>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
                  <span style={{color:"#64748B",fontSize:11,fontFamily:"sans-serif"}}>{done}/{items.length} 완료</span>
                  <span style={{color:pct===100?"#10B981":pct>=50?"#F59E0B":"#94A3B8",fontWeight:700,fontFamily:"sans-serif",fontSize:12}}>{pct}%</span>
                </div>
                <div style={{background:"#0F172A",borderRadius:99,height:5,overflow:"hidden"}}>
                  <div style={{width:pct+"%",height:5,background:pct===100?"#10B981":pct>=50?"#F59E0B":"#64748B",transition:"width .3s"}}/>
                </div>
              </button>
            );
          })}
        </div>
      )}

      {/* ── 직원 상세 뷰 ── */}
      {view==="people" && selEmp && (()=>{
        const emp = emps.find(e=>e.id===selEmp);
        if(!emp) return null;
        const done = items.filter(t=>getProg(emp.id,t.id)==="done").length;
        const pct = items.length>0 ? Math.round(done/items.length*100) : 0;
        return (
          <div>
            <button onClick={()=>setSelEmp(null)} style={{...S.btnG,marginBottom:14,fontSize:12}}>← 목록으로</button>
            <div style={{...S.card,marginBottom:14,display:"flex",alignItems:"center",gap:12}}>
              <div style={{width:40,height:40,borderRadius:10,background:emp.color+"22",display:"flex",alignItems:"center",justifyContent:"center",color:emp.color,fontWeight:800,fontSize:18,fontFamily:"sans-serif",flexShrink:0}}>{emp.name[0]}</div>
              <div style={{flex:1}}>
                <span style={{color:emp.color,fontWeight:700,fontFamily:"sans-serif",fontSize:15}}>{emp.name}</span>
                <div style={{background:"#0F172A",borderRadius:99,height:5,overflow:"hidden",marginTop:6}}>
                  <div style={{width:pct+"%",height:5,background:pct===100?"#10B981":pct>=50?"#F59E0B":"#64748B"}}/>
                </div>
              </div>
              <span style={{color:pct===100?"#10B981":"#F59E0B",fontWeight:800,fontFamily:"sans-serif",fontSize:18,flexShrink:0}}>{pct}%</span>
            </div>
            <p style={{color:"#475569",fontSize:11,fontFamily:"sans-serif",margin:"0 0 10px"}}>클릭으로 상태 변경 (미진행 → 진행중 → 완료)</p>
            {cats.map(cat=>(
              <div key={cat} style={{marginBottom:12}}>
                <p style={{color:"#94A3B8",fontSize:11,fontFamily:"sans-serif",fontWeight:700,margin:"0 0 6px",textTransform:"uppercase"}}>📁 {cat}</p>
                {items.filter(t=>t.cat===cat).map(item=>{
                  const p = getProg(emp.id, item.id);
                  const st = ST[p]||ST.pending;
                  return (
                    <button key={item.id} onClick={()=>cycle(emp.id,item.id)}
                      style={{width:"100%",display:"flex",alignItems:"center",gap:10,background:"#1E293B",border:"1px solid #334155",borderRadius:8,padding:"10px 14px",marginBottom:4,cursor:"pointer",textAlign:"left"}}>
                      <div style={{width:24,height:24,borderRadius:6,background:st.bg,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:13,fontWeight:700,flexShrink:0}}>{st.icon}</div>
                      <span style={{color:"#CBD5E1",fontFamily:"sans-serif",fontSize:13,flex:1}}>{item.name}</span>
                      <span style={{color:st.bg,fontSize:11,fontFamily:"sans-serif",fontWeight:600,flexShrink:0}}>{st.label}</span>
                    </button>
                  );
                })}
              </div>
            ))}
            {items.length===0 && <p style={{color:"#475569",fontFamily:"sans-serif",fontSize:13,textAlign:"center",padding:"20px 0"}}>항목을 먼저 추가해주세요</p>}
          </div>
        );
      })()}

      {/* ── 항목 관리 뷰 ── */}
      {view==="items" && (
        <div>
          {cats.map(cat=>(
            <div key={cat} style={{marginBottom:14}}>
              <p style={{color:"#94A3B8",fontSize:11,fontFamily:"sans-serif",fontWeight:700,margin:"0 0 6px",textTransform:"uppercase"}}>📁 {cat}</p>
              {items.filter(t=>t.cat===cat).map(item=>(
                <div key={item.id} style={{...S.card,display:"flex",alignItems:"center",gap:8,padding:"10px 14px",marginBottom:4}}>
                  <span style={{color:"#CBD5E1",fontFamily:"sans-serif",fontSize:13,flex:1}}>{item.name}</span>
                  <button onClick={()=>delItem(item.id)} style={{background:"none",border:"none",color:"#EF4444",cursor:"pointer",fontSize:16,padding:0}}>✕</button>
                </div>
              ))}
            </div>
          ))}
          <div style={{...S.card,display:"flex",gap:8,alignItems:"center"}}>
            <input placeholder="카테고리" value={newCat} onChange={e=>setNewCat(e.target.value)} style={{...S.inp,width:90}}/>
            <input placeholder="항목 이름" value={newName} onChange={e=>setNewName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addItem()} style={{...S.inp,flex:1}}/>
            <button onClick={addItem} style={S.btnA}>추가</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Notices Tab ───────────────────────────────────────────────────────────────
function NoticeTab({data, upd}) {
  const [form, setForm] = useState(null);
  const [title, setTitle] = useState(""); const [content, setContent] = useState(""); const [pinned, setPinned] = useState(false);
  const [attachments, setAttachments] = useState([]); // [{name,type,data}]
  const [readExpand, setReadExpand] = useState(null); // notice id
  const notices = A(data.notices); const readBy = O(data.readBy); const emps = A(data.employees);

  function openNew() { setTitle(""); setContent(""); setPinned(false); setAttachments([]); setForm("new"); }
  function openEdit(n) { setTitle(n.title); setContent(n.content); setPinned(!!n.pinned); setAttachments(A(n.attachments)); setForm(n); }
  function handleFile(e) {
    const files = Array.from(e.target.files||[]);
    files.forEach(file => {
      if (file.size > 5*1024*1024) { alert(file.name+": 파일이 5MB를 초과합니다"); return; }
      const reader = new FileReader();
      reader.onload = ev => setAttachments(prev => [...prev, {name:file.name, type:file.type, data:ev.target.result}]);
      reader.readAsDataURL(file);
    });
    e.target.value = "";
  }
  function save() {
    if (!title.trim()) return;
    if (form==="new") upd("notices", [{id:Date.now(), createdAt:new Date().toISOString(), title, content, pinned, attachments}, ...notices]);
    else upd("notices", notices.map(n => n.id===form.id ? {...n,title,content,pinned,attachments} : n));
    setForm(null);
  }
  function del(id) { upd("notices", notices.filter(n=>n.id!==id)); }
  const sorted = [...notices].sort((a,b) => (b.pinned?1:0)-(a.pinned?1:0) || new Date(b.createdAt)-new Date(a.createdAt));

  return (
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
        <h2 style={{color:"#E2E8F0",fontFamily:"sans-serif",fontWeight:700,margin:0,fontSize:18}}>📢 공지사항</h2>
        <button onClick={form?()=>setForm(null):openNew} style={S.btnA}>{form?"취소":"+ 작성"}</button>
      </div>
      {form && (
        <div style={{...S.card,marginBottom:14}}>
          <input value={title} onChange={e=>setTitle(e.target.value)} placeholder="제목" style={{...S.inp,marginBottom:8}}/>
          <textarea value={content} onChange={e=>setContent(e.target.value)} rows={4} placeholder="내용" style={{background:"#0F172A",border:"1px solid #334155",borderRadius:8,padding:"8px 12px",color:"#E2E8F0",fontSize:13,fontFamily:"sans-serif",outline:"none",width:"100%",boxSizing:"border-box",resize:"vertical",marginBottom:10}}/>
          {/* 파일 첨부 */}
          <div style={{marginBottom:10}}>
            <label style={{...S.lbl,display:"inline-block",marginBottom:6}}>📎 파일 첨부 (이미지·PDF, 최대 5MB)</label>
            <input type="file" accept="image/*,.pdf" multiple onChange={handleFile}
              style={{display:"block",color:"#94A3B8",fontFamily:"sans-serif",fontSize:12,marginBottom:6}}/>
            {attachments.map((f,i) => (
              <div key={i} style={{display:"flex",alignItems:"center",gap:6,background:"#0F172A",borderRadius:6,padding:"5px 10px",marginBottom:3}}>
                <span style={{fontSize:14}}>{f.type.startsWith("image")?"🖼":"📄"}</span>
                <span style={{color:"#CBD5E1",fontSize:12,fontFamily:"sans-serif",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{f.name}</span>
                <button onClick={()=>setAttachments(attachments.filter((_,j)=>j!==i))} style={{background:"none",border:"none",color:"#EF4444",cursor:"pointer",fontSize:14,padding:0}}>✕</button>
              </div>
            ))}
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
            <input type="checkbox" id="npin" checked={pinned} onChange={e=>setPinned(e.target.checked)}/>
            <label htmlFor="npin" style={{color:"#CBD5E1",fontFamily:"sans-serif",fontSize:13,cursor:"pointer"}}>📌 상단 고정</label>
          </div>
          <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
            <button onClick={()=>setForm(null)} style={S.btnG}>취소</button>
            <button onClick={save} style={S.btnA}>{form==="new"?"등록":"수정 완료"}</button>
          </div>
        </div>
      )}
      {sorted.map(n => {
        const rl = A(readBy[n.id]);
        const readEmps   = emps.filter(e => rl.includes(e.id));
        const unreadEmps = emps.filter(e => e.role!=="manager" && !rl.includes(e.id));
        const isExpanded = readExpand===n.id;
        return (
          <div key={n.id} style={{...S.card,border:"1px solid "+(n.pinned?"rgba(245,158,11,.3)":"#334155")}}>
            <div style={{display:"flex",alignItems:"flex-start",gap:8,marginBottom:6}}>
              {n.pinned && <span style={{flexShrink:0}}>📌</span>}
              <span style={{color:"#E2E8F0",fontWeight:700,fontFamily:"sans-serif",fontSize:14,flex:1}}>{n.title}</span>
              <button onClick={()=>setReadExpand(isExpanded?null:n.id)} style={{...S.btnG,fontSize:10,padding:"2px 7px",color:"#10B981",flexShrink:0}}>
                읽음 {readEmps.length}/{emps.filter(e=>e.role!=="manager").length}
              </button>
              <button onClick={()=>openEdit(n)} style={{...S.btnG,fontSize:11,padding:"2px 8px",flexShrink:0}}>수정</button>
              <button onClick={()=>del(n.id)} style={{...S.btnG,fontSize:11,padding:"2px 8px",color:"#EF4444",flexShrink:0}}>삭제</button>
            </div>
            <p style={{color:"#475569",fontSize:11,fontFamily:"sans-serif",margin:"0 0 6px"}}>{new Date(n.createdAt).toLocaleDateString("ko-KR")}</p>
            {n.content && <p style={{color:"#CBD5E1",fontFamily:"sans-serif",fontSize:13,margin:"0 0 8px",whiteSpace:"pre-wrap",lineHeight:1.6}}>{n.content}</p>}
            {/* 첨부파일 */}
            {A(n.attachments).map((f,i) => (
              <div key={i} style={{marginBottom:8}}>
                {f.type.startsWith("image") ? (
                  <img src={f.data} alt={f.name} style={{maxWidth:"100%",maxHeight:300,borderRadius:8,display:"block"}}/>
                ) : (
                  <a href={f.data} download={f.name} style={{display:"inline-flex",alignItems:"center",gap:6,background:"#0F172A",borderRadius:8,padding:"8px 12px",color:"#38BDF8",fontSize:12,fontFamily:"sans-serif",textDecoration:"none"}}>
                    📄 {f.name} 다운로드
                  </a>
                )}
              </div>
            ))}
            {/* 읽음 확인 펼치기 */}
            {isExpanded && (
              <div style={{background:"#0F172A",borderRadius:8,padding:12,marginTop:8}}>
                <p style={{color:"#10B981",fontSize:11,fontFamily:"sans-serif",fontWeight:700,margin:"0 0 6px"}}>✅ 읽음 ({readEmps.length}명)</p>
                <div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:8}}>
                  {readEmps.map(e=><span key={e.id} style={{background:e.color+"22",color:e.color,borderRadius:99,padding:"2px 8px",fontSize:11,fontFamily:"sans-serif",fontWeight:600}}>{e.name}</span>)}
                  {readEmps.length===0 && <span style={{color:"#475569",fontSize:11,fontFamily:"sans-serif"}}>없음</span>}
                </div>
                {unreadEmps.length>0 && <>
                  <p style={{color:"#F59E0B",fontSize:11,fontFamily:"sans-serif",fontWeight:700,margin:"0 0 6px"}}>⏳ 미확인 ({unreadEmps.length}명)</p>
                  <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                    {unreadEmps.map(e=><span key={e.id} style={{background:"#1E293B",color:"#64748B",borderRadius:99,padding:"2px 8px",fontSize:11,fontFamily:"sans-serif"}}>{e.name}</span>)}
                  </div>
                </>}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ── Requests Tab ──────────────────────────────────────────────────────────────
function ReqTab({data, upd}) {
  const [view, setView] = useState("overview");
  const [filter, setFilter] = useState("pending");
  const [quickModal, setQuickModal] = useState(null);

  const reqs  = A(data.reqs);
  const emps  = A(data.employees);
  const week  = A(data.week);
  const sched = O(data.sched);
  const pc    = reqs.filter(r => r.status==="pending").length;

  // 승인·대기 요청 전체 삭제
  function clearDone() {
    if (!window.confirm("승인/반려된 요청을 모두 삭제할까요?")) return;
    upd("reqs", reqs.filter(r => r.status==="pending"));
  }

  // 해당 직원·날짜의 모든 휴무 상태 (종일 + 시간) 반환
  function getOffStates(emp, date) {
    const dayReqs = reqs.filter(r => r.empId===emp.id && r.date===date && r.status!=="rejected");
    const states = dayReqs.map(r => ({
      type: r.status==="approved" ? "req_approved" : "req_pending",
      allDay: r.allDay,
      req: r,
    }));
    const cell = getCell(sched, emp.id, date);
    if (cell.off) states.push({type:"sched_off", allDay:true, req:null});
    return states;
  }

  // 현황표 셀 색상·라벨 계산 (여러 상태 중 우선순위: 승인 > 대기 > sched_off)
  function cellStyle(states) {
    if (!states.length) return {bg:"", label:"", sub:"", color:"#334155"};
    const approved  = states.find(s => s.type==="req_approved");
    const pending   = states.find(s => s.type==="req_pending");
    const schedOff  = states.find(s => s.type==="sched_off");
    if (approved) {
      const lbl = approved.allDay ? "종일" : approved.req.start+"~"+approved.req.end;
      return {bg:"rgba(16,185,129,.22)", label:"승인", sub:lbl, color:"#10B981"};
    }
    if (pending) {
      const lbl = pending.allDay ? "종일" : pending.req.start+"~"+pending.req.end;
      return {bg:"rgba(245,158,11,.22)", label:"대기", sub:lbl, color:"#F59E0B"};
    }
    if (schedOff) return {bg:"rgba(100,116,139,.2)", label:"휴무", sub:"", color:"#94A3B8"};
    return {bg:"", label:"", sub:"", color:"#334155"};
  }

  const shown = reqs
    .filter(r => filter==="all" || r.status===filter)
    .sort((a,b) => new Date(b.createdAt)-new Date(a.createdAt));
  const doneCount = reqs.filter(r => r.status!=="pending").length;

  return (
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10,marginBottom:14}}>
        <h2 style={{color:"#E2E8F0",fontFamily:"sans-serif",fontWeight:700,margin:0,fontSize:18}}>휴무 관리</h2>
        <div style={{display:"flex",gap:6}}>
          <button onClick={()=>setView("overview")} style={{...S.btnG,...(view==="overview"?{color:"#F59E0B",borderColor:"#F59E0B55"}:{})}}>📊 현황표</button>
          <button onClick={()=>setView("requests")} style={{...S.btnG,...(view==="requests"?{color:"#38BDF8",borderColor:"rgba(29,78,216,.3)"}:{})}}>
            📬 요청{pc>0&&<span style={{marginLeft:4,background:"#EF4444",color:"#fff",borderRadius:99,padding:"0 5px",fontSize:10}}>{pc}</span>}
          </button>
        </div>
      </div>

      {/* ── 현황표 ── */}
      {view==="overview" && (
        <div>
          <p style={{color:"#475569",fontSize:11,fontFamily:"sans-serif",margin:"0 0 10px"}}>
            셀 클릭 → 수정 &nbsp;·&nbsp;
            <span style={{color:"#10B981"}}>■</span> 승인 &nbsp;
            <span style={{color:"#F59E0B"}}>■</span> 대기 &nbsp;
            <span style={{color:"#94A3B8"}}>■</span> 직접 설정
          </p>
          <div style={{overflowX:"auto"}}>
            <table style={{borderCollapse:"separate",borderSpacing:3,minWidth:"max-content"}}>
              <thead>
                <tr>
                  <th style={{background:"#1E293B",border:"1px solid #334155",borderRadius:6,padding:"8px 14px",color:"#94A3B8",fontFamily:"sans-serif",fontSize:11,textAlign:"left",minWidth:90,position:"sticky",left:0,zIndex:2}}>직원</th>
                  {week.map(day => {
                    const wk = ["토","일"].includes(day.label);
                    return (
                      <th key={day.id} style={{background:wk?"#2D1A0A":"#1E293B",border:"1px solid #334155",borderRadius:6,padding:"6px 10px",color:wk?"#F87171":"#94A3B8",fontFamily:"sans-serif",fontSize:11,textAlign:"center",minWidth:62}}>
                        <div style={{fontWeight:700}}>{day.label}</div>
                        <div style={{fontSize:10,color:"#475569",marginTop:1}}>{day.date.slice(5)}</div>
                      </th>
                    );
                  })}
                  <th style={{background:"#1E293B",border:"1px solid #334155",borderRadius:6,padding:"6px 8px",color:"#94A3B8",fontFamily:"sans-serif",fontSize:11,textAlign:"center",minWidth:46}}>합계</th>
                </tr>
              </thead>
              <tbody>
                {emps.map(emp => {
                  const totalOff = week.filter(day => getOffStates(emp, day.date).length > 0).length;
                  return (
                    <tr key={emp.id}>
                      <td style={{background:"#1E293B",border:"1px solid #334155",borderRadius:6,padding:"7px 14px",position:"sticky",left:0,zIndex:1}}>
                        <div style={{display:"flex",alignItems:"center",gap:6}}>
                          <div style={{width:7,height:7,borderRadius:99,background:emp.color,flexShrink:0}}/>
                          <span style={{color:emp.color,fontWeight:700,fontFamily:"sans-serif",fontSize:12,whiteSpace:"nowrap"}}>{emp.name}</span>
                        </div>
                      </td>
                      {week.map(day => {
                        const states = getOffStates(emp, day.date);
                        const wk = ["토","일"].includes(day.label);
                        const cs = cellStyle(states);
                        const bg = cs.bg || (wk ? "rgba(239,68,68,.04)" : "#0F172A");
                        return (
                          <td key={day.id} style={{padding:2,textAlign:"center"}}>
                            <button onClick={()=>setQuickModal({emp, day})}
                              style={{width:"100%",minWidth:58,minHeight:42,borderRadius:7,background:bg,border:"1.5px solid "+(states.length?"transparent":"#1E293B"),cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:1,padding:"4px 2px"}}>
                              {cs.label && <span style={{fontSize:10,color:cs.color,fontWeight:700,fontFamily:"sans-serif",lineHeight:1}}>{cs.label}</span>}
                              {cs.sub   && <span style={{fontSize:9,color:cs.color+"CC",fontFamily:"sans-serif",lineHeight:1,whiteSpace:"nowrap"}}>{cs.sub}</span>}
                            </button>
                          </td>
                        );
                      })}
                      <td style={{textAlign:"center",padding:"0 4px"}}>
                        <span style={{color:totalOff>0?"#F87171":"#334155",fontWeight:700,fontFamily:"sans-serif",fontSize:12}}>
                          {totalOff>0?totalOff+"일":"-"}
                        </span>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {/* ── 요청 목록 ── */}
      {view==="requests" && (
        <div>
          <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:12,flexWrap:"wrap"}}>
            {["pending","approved","rejected","all"].map(f => (
              <button key={f} onClick={()=>setFilter(f)} style={{...S.btnG,...(filter===f?{color:"#38BDF8",borderColor:"rgba(29,78,216,.3)"}:{})}}>
                {{pending:"대기",approved:"승인",rejected:"반려",all:"전체"}[f]}
                {f==="pending"&&pc>0&&<span style={{marginLeft:4,background:"#EF4444",color:"#fff",borderRadius:99,padding:"0 5px",fontSize:10}}>{pc}</span>}
              </button>
            ))}
            {doneCount>0 && (
              <button onClick={clearDone} style={{...S.btnG,color:"#EF4444",borderColor:"#EF444433",marginLeft:"auto"}}>
                🗑 처리완료 전체삭제 ({doneCount})
              </button>
            )}
          </div>
          {shown.length===0 && <p style={{color:"#475569",fontFamily:"sans-serif",textAlign:"center",padding:"40px 0"}}>요청 없음</p>}
          {shown.map(req => {
            const emp = emps.find(e=>e.id===req.empId);
            const ss  = RQS[req.status]||RQS.pending;
            return (
              <div key={req.id} style={S.card}>
                <div style={{display:"flex",alignItems:"center",marginBottom:8}}>
                  <span style={{color:emp?emp.color:"#94A3B8",fontWeight:700,fontSize:14,fontFamily:"sans-serif",flex:1}}>{emp?.name||"?"}</span>
                  <span style={{color:"#64748B",fontSize:11,fontFamily:"sans-serif"}}>{new Date(req.createdAt).toLocaleDateString("ko-KR")}</span>
                  <span style={{background:ss.bg,color:ss.tx,borderRadius:99,padding:"2px 10px",fontSize:11,fontWeight:700,fontFamily:"sans-serif",marginLeft:8}}>{ss.lb}</span>
                  {/* 삭제 버튼 – 처리 완료된 것만 */}
                  {req.status!=="pending" && (
                    <button onClick={()=>upd("reqs", reqs.filter(r=>r.id!==req.id))}
                      style={{background:"none",border:"none",color:"#475569",cursor:"pointer",fontSize:16,padding:"0 0 0 8px",lineHeight:1}}
                      title="삭제">✕</button>
                  )}
                </div>
                <div style={{background:"#0F172A",borderRadius:8,padding:"10px 12px",marginBottom:req.status==="pending"?10:0}}>
                  <p style={{color:"#CBD5E1",fontSize:13,fontFamily:"sans-serif",margin:"0 0 3px"}}>📅 {req.date} {req.allDay?"(종일)":req.start+"~"+req.end}</p>
                  {req.reason&&<p style={{color:"#94A3B8",fontSize:12,fontFamily:"sans-serif",margin:0}}>💬 {req.reason}</p>}
                </div>
                {req.status==="pending" && (
                  <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:2}}>
                    <button onClick={()=>upd("reqs",reqs.map(r=>r.id===req.id?{...r,status:"rejected"}:r))} style={{...S.btnG,background:"#FEE2E2",color:"#991B1B",borderColor:"#FECACA"}}>반려</button>
                    <button onClick={()=>upd("reqs",reqs.map(r=>r.id===req.id?{...r,status:"approved"}:r))} style={{...S.btnG,background:"#D1FAE5",color:"#065F46",borderColor:"#A7F3D0"}}>승인</button>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}

      {/* ── 빠른 수정 모달 ── */}
      {quickModal && (
        <QuickOffModal
          emp={quickModal.emp}
          day={quickModal.day}
          reqs={reqs}
          sched={sched}
          onClose={()=>setQuickModal(null)}
          onUpdateReq={(id,status)=>upd("reqs",reqs.map(r=>r.id===id?{...r,status}:r))}
          onDeleteReq={(id)=>upd("reqs",reqs.filter(r=>r.id!==id))}
          onAddReq={(req)=>upd("reqs",[...reqs,req])}
          onSetSchedOff={(off)=>{
            const key = quickModal.emp.id+"__"+quickModal.day.date;
            upd("sched",{...sched,[key]:off?{start:"",end:"",brk:0,off:true}:{start:"",end:"",brk:0,off:false}});
          }}
        />
      )}
    </div>
  );
}

function QuickOffModal({emp, day, reqs, sched, onClose, onUpdateReq, onDeleteReq, onAddReq, onSetSchedOff}) {
  const [reason, setReason] = useState("");
  const [startT, setStartT] = useState("09:00");
  const [endT,   setEndT]   = useState("18:00");
  const [mode, setMode] = useState("allday"); // "allday" | "partial"

  const anyReqs = reqs.filter(r => r.empId===emp.id && r.date===day.date && r.status!=="rejected");
  const cell = getCell(sched, emp.id, day.date);
  const isSchedOff = cell.off;
  const hasOff = anyReqs.length > 0 || isSchedOff;

  function addOff() {
    const allDay = mode==="allday";
    // 스케줄에 바로 off 표시
    const key = emp.id+"__"+day.date;
    if (allDay) {
      onSetSchedOff(true);
    } else {
      // 부분 휴무는 req로 기록 (스케줄엔 별도로 표시 안함, 요청 목록에서 확인)
      onAddReq({id:Date.now(), empId:emp.id, date:day.date, allDay:false, start:startT, end:endT, reason:reason||"관리자 직접 등록", status:"approved", createdAt:new Date().toISOString()});
    }
    onClose();
  }

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.65)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300,padding:16}}>
      <div style={{background:"#1E293B",borderRadius:16,padding:22,width:"100%",maxWidth:320,border:"1px solid #334155"}}>
        <div style={{display:"flex",alignItems:"center",marginBottom:16}}>
          <div style={{flex:1}}>
            <span style={{color:emp.color,fontWeight:800,fontFamily:"sans-serif",fontSize:15}}>{emp.name}</span>
            <span style={{color:"#64748B",fontFamily:"sans-serif",fontSize:13,marginLeft:8}}>{day.label} {day.date.slice(5)}</span>
          </div>
          <button onClick={onClose} style={{background:"none",border:"none",color:"#64748B",fontSize:20,cursor:"pointer",padding:0}}>✕</button>
        </div>

        {/* 기존 휴무 목록 */}
        {anyReqs.map(req => (
          <div key={req.id} style={{background:"rgba(16,185,129,.08)",border:"1px solid rgba(16,185,129,.25)",borderRadius:10,padding:"10px 12px",marginBottom:8,display:"flex",alignItems:"center",gap:8}}>
            <div style={{flex:1}}>
              <span style={{color:"#10B981",fontWeight:700,fontSize:12,fontFamily:"sans-serif"}}>{req.allDay?"종일":req.start+"~"+req.end}</span>
              {req.reason && <span style={{color:"#64748B",fontSize:11,fontFamily:"sans-serif",marginLeft:6}}>{req.reason}</span>}
            </div>
            <button onClick={()=>{onDeleteReq(req.id);}} style={{background:"none",border:"none",color:"#EF4444",cursor:"pointer",fontSize:16,padding:0}}>✕</button>
          </div>
        ))}
        {isSchedOff && (
          <div style={{background:"rgba(100,116,139,.15)",border:"1px solid #334155",borderRadius:10,padding:"10px 12px",marginBottom:8,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <span style={{color:"#94A3B8",fontWeight:700,fontSize:12,fontFamily:"sans-serif"}}>스케줄 휴무</span>
            <button onClick={()=>{onSetSchedOff(false);onClose();}} style={{background:"none",border:"none",color:"#EF4444",cursor:"pointer",fontSize:16,padding:0}}>✕</button>
          </div>
        )}

        {/* 휴무 추가 */}
        <div style={{borderTop:hasOff?"1px solid #334155":"none",paddingTop:hasOff?14:0}}>
          {hasOff && <p style={{color:"#94A3B8",fontSize:11,fontFamily:"sans-serif",fontWeight:600,margin:"0 0 10px",textTransform:"uppercase"}}>휴무 추가</p>}
          <div style={{display:"flex",gap:6,marginBottom:10}}>
            <button onClick={()=>setMode("allday")} style={{flex:1,padding:"8px",borderRadius:8,border:"2px solid "+(mode==="allday"?"#F87171":"#334155"),background:mode==="allday"?"rgba(239,68,68,.12)":"#0F172A",color:mode==="allday"?"#F87171":"#64748B",fontFamily:"sans-serif",fontSize:12,fontWeight:700,cursor:"pointer"}}>종일</button>
            <button onClick={()=>setMode("partial")} style={{flex:1,padding:"8px",borderRadius:8,border:"2px solid "+(mode==="partial"?"#38BDF8":"#334155"),background:mode==="partial"?"rgba(56,189,248,.12)":"#0F172A",color:mode==="partial"?"#38BDF8":"#64748B",fontFamily:"sans-serif",fontSize:12,fontWeight:700,cursor:"pointer"}}>시간 지정</button>
          </div>
          {mode==="partial" && (
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
              <div><label style={{display:"block",color:"#94A3B8",fontSize:10,fontFamily:"sans-serif",fontWeight:600,marginBottom:3}}>시작</label><input type="time" value={startT} onChange={e=>setStartT(e.target.value)} style={S.inp}/></div>
              <div><label style={{display:"block",color:"#94A3B8",fontSize:10,fontFamily:"sans-serif",fontWeight:600,marginBottom:3}}>종료</label><input type="time" value={endT}   onChange={e=>setEndT(e.target.value)}   style={S.inp}/></div>
            </div>
          )}
          <input value={reason} onChange={e=>setReason(e.target.value)} placeholder="사유 (선택)" style={{...S.inp,marginBottom:10}}/>
          <button onClick={addOff} style={{...S.btnA,width:"100%"}}>
            {mode==="allday"?"🗓 종일 휴무 지정":"⏱ 시간 휴무 추가"}
          </button>
        </div>
        <button onClick={onClose} style={{...S.btnG,width:"100%",marginTop:8,fontSize:12}}>닫기</button>
      </div>
    </div>
  );
}

// ── Hour Management Tab ───────────────────────────────────────────────────────
function HourTab({data, upd, mgr}) {
  const STANDARD = 39; // 주당 기준 시간
  const ledger   = O(data.hourLedger);   // { [weekId]: {actual, adj, note} }
  const week     = A(data.week);
  const sched    = O(data.sched);
  const weekId   = week[0]?.date || "";

  // 이번 주 실제 근무시간 계산 (스케줄 기반)
  const thisWeekActual = week.reduce((s,d) => s + calcH(getCell(sched, mgr.id, d.date)), 0);

  // 편집 상태
  const [editId,   setEditId]   = useState(null);
  const [editAct,  setEditAct]  = useState("");
  const [editAdj,  setEditAdj]  = useState("");
  const [editNote, setEditNote] = useState("");

  function openEdit(wid, row) {
    setEditId(wid);
    setEditAct(String(row?.actual ?? ""));
    setEditAdj(String(row?.adj    ?? 0));
    setEditNote(row?.note ?? "");
  }
  function saveEdit() {
    const actual = parseFloat(editAct) || 0;
    const adj    = parseFloat(editAdj) || 0;
    upd("hourLedger", {...ledger, [editId]: {actual, adj, note:editNote}});
    setEditId(null);
  }

  // 이번 주를 장부에 반영 (스케줄 → actual 자동 입력)
  function recordThisWeek() {
    const existing = ledger[weekId] || {};
    upd("hourLedger", {...ledger, [weekId]: {
      actual: thisWeekActual,
      adj:    existing.adj    || 0,
      note:   existing.note   || "",
    }});
  }

  // 전체 누적 계산
  const rows    = Object.entries(ledger).sort(([a],[b]) => a.localeCompare(b));
  const cumulative = rows.reduce((s,[,r]) => s + (r.actual - STANDARD + (r.adj||0)), 0);
  const thisRow = ledger[weekId];
  const thisWeekDelta = thisRow ? (thisRow.actual - STANDARD + (thisRow.adj||0)) : null;

  // 숫자 색상
  const dc = n => n > 0 ? "#F87171" : n < 0 ? "#38BDF8" : "#94A3B8";
  const fmt = n => (n > 0 ? "+" : "") + Math.round(n*10)/10 + "h";

  return (
    <div style={{maxWidth:620}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10,marginBottom:18}}>
        <div>
          <h2 style={{color:"#E2E8F0",fontFamily:"sans-serif",fontWeight:700,margin:0,fontSize:18}}>⏱ 시간관리 — {mgr.name}</h2>
          <p style={{color:"#64748B",fontSize:12,fontFamily:"sans-serif",margin:"3px 0 0"}}>기준 {STANDARD}h/주 · 초과 <span style={{color:"#F87171"}}>빨강</span> · 부족 <span style={{color:"#38BDF8"}}>파랑</span></p>
        </div>
        {/* 누적 잔액 뱃지 */}
        <div style={{background:"#1E293B",border:"1px solid "+(cumulative>0?"#F8717144":cumulative<0?"#38BDF844":"#334155"),borderRadius:12,padding:"10px 18px",textAlign:"center"}}>
          <p style={{color:"#94A3B8",fontSize:10,fontFamily:"sans-serif",margin:"0 0 2px",textTransform:"uppercase",fontWeight:600}}>누적 잔액</p>
          <p style={{color:dc(cumulative),fontWeight:800,fontFamily:"sans-serif",fontSize:24,margin:0}}>{fmt(cumulative)}</p>
        </div>
      </div>

      {/* 이번 주 카드 */}
      <div style={{...S.card,marginBottom:16,border:"1px solid #F59E0B44"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8,marginBottom:12}}>
          <div>
            <p style={{color:"#F59E0B",fontWeight:700,fontFamily:"sans-serif",fontSize:13,margin:0}}>이번 주 ({weekId}~)</p>
            <p style={{color:"#64748B",fontSize:11,fontFamily:"sans-serif",margin:"2px 0 0"}}>스케줄 기반 예상 근무: <span style={{color:"#E2E8F0",fontWeight:700}}>{thisWeekActual}h</span></p>
          </div>
          <div style={{display:"flex",gap:6}}>
            <button onClick={recordThisWeek} style={{...S.btnA,fontSize:11,padding:"6px 12px"}}>
              📥 스케줄에서 가져오기
            </button>
            {thisRow && <button onClick={()=>openEdit(weekId,thisRow)} style={{...S.btnG,fontSize:11}}>수정</button>}
          </div>
        </div>
        {thisRow ? (
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
            {[
              {lb:"실제 근무",val:thisRow.actual+"h",c:"#E2E8F0"},
              {lb:"기준 대비",val:fmt(thisRow.actual-STANDARD+(thisRow.adj||0)),c:dc(thisRow.actual-STANDARD+(thisRow.adj||0))},
              {lb:"수동 조정",val:(thisRow.adj||0)===0?"없음":(thisRow.adj>0?"+":"")+thisRow.adj+"h",c:"#94A3B8"},
            ].map(x=>(
              <div key={x.lb} style={{background:"#0F172A",borderRadius:8,padding:"8px 12px",textAlign:"center"}}>
                <p style={{color:"#64748B",fontSize:10,fontFamily:"sans-serif",margin:"0 0 3px",fontWeight:600}}>{x.lb}</p>
                <p style={{color:x.c,fontSize:16,fontWeight:800,fontFamily:"sans-serif",margin:0}}>{x.val}</p>
              </div>
            ))}
          </div>
        ) : (
          <p style={{color:"#475569",fontFamily:"sans-serif",fontSize:13,textAlign:"center",padding:"8px 0",margin:0}}>
            아직 이번 주 기록이 없어요. 스케줄 확정 후 "스케줄에서 가져오기"를 눌러주세요.
          </p>
        )}
        {thisRow?.note && <p style={{color:"#64748B",fontSize:12,fontFamily:"sans-serif",margin:"10px 0 0"}}>📝 {thisRow.note}</p>}
      </div>

      {/* 편집 모달 */}
      {editId && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.6)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,padding:16}}>
          <div style={{...S.card,width:"100%",maxWidth:320,margin:0}}>
            <div style={{display:"flex",alignItems:"center",marginBottom:14}}>
              <span style={{color:"#E2E8F0",fontWeight:700,fontFamily:"sans-serif",fontSize:14,flex:1}}>📝 수정 — {editId}</span>
              <button onClick={()=>setEditId(null)} style={{background:"none",border:"none",color:"#64748B",fontSize:20,cursor:"pointer",padding:0}}>✕</button>
            </div>
            <label style={S.lbl}>실제 근무시간 (h)</label>
            <input type="number" step="0.5" value={editAct} onChange={e=>setEditAct(e.target.value)} style={{...S.inp,marginBottom:10}}/>
            <label style={S.lbl}>수동 조정 (h, 예: +2 또는 -1.5)</label>
            <input type="number" step="0.5" value={editAdj} onChange={e=>setEditAdj(e.target.value)} style={{...S.inp,marginBottom:10}}/>
            <label style={S.lbl}>메모</label>
            <input placeholder="예: 연차 반차 사용" value={editNote} onChange={e=>setEditNote(e.target.value)} style={{...S.inp,marginBottom:14}}/>
            <div style={{display:"flex",gap:8,justifyContent:"space-between"}}>
              <button onClick={()=>{
                if(window.confirm("이 주 기록을 삭제할까요?"))upd("hourLedger",Object.fromEntries(Object.entries(ledger).filter(([k])=>k!==editId)));setEditId(null);
              }} style={{...S.btnG,color:"#EF4444",fontSize:11}}>삭제</button>
              <button onClick={saveEdit} style={S.btnA}>저장</button>
            </div>
          </div>
        </div>
      )}

      {/* 주별 이력 */}
      <h3 style={{color:"#E2E8F0",fontFamily:"sans-serif",fontWeight:700,fontSize:14,margin:"0 0 10px"}}>주별 이력</h3>
      {rows.length===0 && <p style={{color:"#475569",fontFamily:"sans-serif",fontSize:13,textAlign:"center",padding:"20px 0"}}>아직 기록이 없습니다</p>}
      <div style={{overflowX:"auto"}}>
        <table style={{borderCollapse:"separate",borderSpacing:"0 4px",width:"100%",minWidth:420}}>
          <thead>
            <tr>
              {["주 시작일","실제","기준","조정","차이","누계",""].map(h=>(
                <th key={h} style={{background:"#1E293B",border:"1px solid #334155",padding:"6px 10px",color:"#94A3B8",fontFamily:"sans-serif",fontSize:11,fontWeight:600,textAlign:"center",whiteSpace:"nowrap"}}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {(()=>{
              let cum=0;
              return rows.map(([wid,r])=>{
                const delta = r.actual - STANDARD + (r.adj||0);
                cum += delta;
                const isThis = wid===weekId;
                return (
                  <tr key={wid} style={{background:isThis?"rgba(245,158,11,.06)":"transparent"}}>
                    <td style={{background:"#1E293B",border:"1px solid #334155",borderRadius:"6px 0 0 6px",padding:"8px 12px",color:isThis?"#F59E0B":"#CBD5E1",fontFamily:"sans-serif",fontSize:12,fontWeight:isThis?700:400,whiteSpace:"nowrap"}}>{wid}</td>
                    <td style={{background:"#1E293B",border:"1px solid #334155",padding:"8px 10px",color:"#E2E8F0",fontFamily:"sans-serif",fontSize:12,textAlign:"center"}}>{r.actual}h</td>
                    <td style={{background:"#1E293B",border:"1px solid #334155",padding:"8px 10px",color:"#64748B",fontFamily:"sans-serif",fontSize:12,textAlign:"center"}}>{STANDARD}h</td>
                    <td style={{background:"#1E293B",border:"1px solid #334155",padding:"8px 10px",color:"#94A3B8",fontFamily:"sans-serif",fontSize:12,textAlign:"center"}}>{(r.adj||0)===0?"-":(r.adj>0?"+":"")+r.adj+"h"}</td>
                    <td style={{background:"#1E293B",border:"1px solid #334155",padding:"8px 10px",color:dc(delta),fontWeight:700,fontFamily:"sans-serif",fontSize:12,textAlign:"center"}}>{fmt(delta)}</td>
                    <td style={{background:"#1E293B",border:"1px solid #334155",padding:"8px 10px",color:dc(cum),fontWeight:700,fontFamily:"sans-serif",fontSize:12,textAlign:"center"}}>{fmt(cum)}</td>
                    <td style={{background:"#1E293B",border:"1px solid #334155",borderRadius:"0 6px 6px 0",padding:"4px 8px",textAlign:"center"}}>
                      <button onClick={()=>openEdit(wid,r)} style={{...S.btnG,fontSize:10,padding:"3px 8px"}}>수정</button>
                    </td>
                  </tr>
                );
              });
            })()}
          </tbody>
        </table>
      </div>
      {rows.length>0 && (
        <button onClick={()=>{if(window.confirm("전체 이력을 초기화할까요?"))upd("hourLedger",{});}}
          style={{...S.btnG,color:"#EF4444",fontSize:11,marginTop:12}}>🗑 전체 초기화</button>
      )}
    </div>
  );
}

      </div>
      <div style={{...S.card,marginBottom:16}}>
        <p style={{color:"#CBD5E1",fontFamily:"sans-serif",fontWeight:700,margin:"0 0 10px",fontSize:14}}>🎯 스킬 목록</p>
        {skills.map(sk => (
          <div key={sk.id} style={{background:"#0F172A",borderRadius:8,padding:"8px 12px",marginBottom:4,border:"1px solid #334155",display:"flex",alignItems:"center",gap:8}}>
            <span style={{color:"#64748B",fontSize:11,fontFamily:"sans-serif",width:48}}>{sk.cat}</span>
            <span style={{color:"#E2E8F0",fontSize:13,fontFamily:"sans-serif",flex:1,fontWeight:700}}>{sk.name}</span>
            <button onClick={()=>upd("skills",skills.filter(x=>x.id!==sk.id))} style={{background:"none",border:"none",color:"#EF4444",cursor:"pointer",fontSize:15,padding:0}}>✕</button>
          </div>
        ))}
        <div style={{display:"flex",gap:8,marginTop:10}}>
          <input placeholder="카테고리" value={nc} onChange={e=>setNc(e.target.value)} style={{...S.inp,width:90}}/>
          <input placeholder="스킬 이름" value={ns} onChange={e=>setNs(e.target.value)} style={{...S.inp,flex:1}}/>
          <button onClick={()=>{if(!ns.trim())return;upd("skills",[...skills,{id:ns.trim().replace(/\s/g,"_")+"_"+uid(),cat:nc||"기타",name:ns.trim()}]);setNs("");setNc("");}} style={S.btnA}>추가</button>
        </div>
      </div>
      <button onClick={()=>{upd("cfg",{pin,reqStart:rs,reqEnd:re});alert("저장됐습니다.");}} style={S.btnP}>💾 저장</button>
    </div>
  );
}

function StaffSchedView({data, emp}) {
  const week      = A(data.week);
  const emps      = A(data.employees);
  const confirmed = O(data.confirmedScheds);
  const weekId    = week[0]?.date || "";
  const snap      = confirmed[weekId] || null;
  const myH       = snap ? week.reduce((s,d) => s+calcH(getCell(snap,emp.id,d.date)), 0) : 0;
  const TH = {border:"1px solid #475569",padding:"4px 6px",textAlign:"center",fontFamily:"sans-serif",fontSize:10,fontWeight:700,color:"#94A3B8",whiteSpace:"nowrap",background:"#1E293B"};

  return (
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10,marginBottom:14}}>
        <div>
          <h2 style={{color:"#E2E8F0",fontFamily:"sans-serif",fontWeight:700,margin:0,fontSize:18}}>확정 스케줄</h2>
          <p style={{color:"#64748B",fontSize:12,fontFamily:"sans-serif",margin:"2px 0 0"}}>{week[0]?.date||"미설정"} ~ {week[6]?.date||""}</p>
        </div>
        {snap
          ? <span style={{background:"#D1FAE5",color:"#065F46",borderRadius:99,padding:"4px 14px",fontSize:12,fontWeight:700,fontFamily:"sans-serif"}}>✅ 확정됨</span>
          : <span style={{background:"#FEF3C7",color:"#92400E",borderRadius:99,padding:"4px 14px",fontSize:12,fontWeight:700,fontFamily:"sans-serif"}}>⏳ 미확정</span>
        }
      </div>
      {!snap && (
        <div style={{background:"#1E293B",borderRadius:10,padding:28,border:"1px solid #334155",textAlign:"center"}}>
          <p style={{color:"#64748B",fontFamily:"sans-serif",fontSize:13,margin:0}}>관리자가 아직 스케줄을 확정하지 않았습니다</p>
        </div>
      )}
      {snap && myH>0 && (
        <div style={{background:"#1E293B",borderRadius:10,padding:"12px 16px",border:"1px solid #F59E0B44",display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <span style={{color:"#94A3B8",fontFamily:"sans-serif",fontSize:13}}>이번 주 내 총 근무</span>
          <span style={{color:myH>=15?"#EF4444":"#F59E0B",fontWeight:800,fontFamily:"sans-serif",fontSize:20}}>{myH}h{myH>=15?" ⚠️":""}</span>
        </div>
      )}
      {snap && (
        <div style={{overflowX:"auto",borderRadius:10,border:"1px solid #334155"}}>
          <table style={{borderCollapse:"collapse",minWidth:"max-content"}}>
            <thead>
              <tr>
                <th rowSpan={2} style={{...TH,minWidth:72,position:"sticky",left:0,zIndex:3,borderRight:"2px solid #475569"}}>직원</th>
                {week.map(day => {
                  const wk=["토","일"].includes(day.label);
                  return <th key={day.id} colSpan={4} style={{...TH,background:wk?"#2D1A0A":"#1E293B",color:wk?"#F87171":"#94A3B8",padding:"5px 6px"}}>{day.label} {day.date.slice(5)}</th>;
                })}
                <th rowSpan={2} style={{...TH,minWidth:44,color:"#F59E0B",borderLeft:"2px solid #475569"}}>합계</th>
              </tr>
              <tr>
                {week.map(day => {
                  const wk=["토","일"].includes(day.label);
                  const sub={...TH,background:wk?"#2D1A0A":"#162030",fontSize:9,padding:"2px 4px",color:"#64748B"};
                  return (
                    <th key={day.id+"s"} style={{display:"contents"}}>
                      <th style={{...sub,minWidth:40}}>출근</th>
                      <th style={{...sub,minWidth:40}}>퇴근</th>
                      <th style={{...sub,minWidth:26}}>휴식</th>
                      <th style={{...sub,minWidth:30,color:"#F59E0B"}}>시간</th>
                    </th>
                  );
                })}
              </tr>
            </thead>
            <tbody>
              {emps.map((e,ei) => {
                const isMe = e.id===emp.id;
                const tot  = week.reduce((s,d) => s+calcH(getCell(snap,e.id,d.date)), 0);
                return (
                  <tr key={e.id} style={{background:isMe?"rgba(245,158,11,.06)":ei%2===0?"#0A0F18":"#0D1420"}}>
                    <td style={{background:isMe?"rgba(245,158,11,.08)":"#1A2535",border:"1px solid #2D3748",borderRight:"2px solid #475569",padding:"4px 10px",position:"sticky",left:0,zIndex:1}}>
                      <span style={{color:e.color,fontWeight:700,fontFamily:"sans-serif",fontSize:12,whiteSpace:"nowrap"}}>{isMe?"→ ":""}{e.name}</span>
                    </td>
                    {week.map(day => {
                      const cell = getCell(snap,e.id,day.date);
                      const h    = calcH(cell);
                      const wk   = ["토","일"].includes(day.label);
                      const isSub= !!(cell.substitute&&!cell.locked);
                      const bg   = cell.off?"rgba(245,158,11,.22)":isSub?"rgba(239,68,68,.10)":wk?"rgba(239,68,68,.04)":"transparent";
                      const td   = {background:bg,border:"1px solid #2D3748",padding:"3px 5px",textAlign:"center",fontSize:11,fontFamily:"sans-serif",whiteSpace:"nowrap"};
                      if (cell.off) return (
                        <th key={day.id} style={{display:"contents"}}>
                          <td style={{...td,color:"#F59E0B",fontWeight:700,fontSize:10}}>휴무</td>
                          <td style={td}/><td style={td}/><td style={td}/>
                        </th>
                      );
                      return (
                        <th key={day.id} style={{display:"contents"}}>
                          <td style={{...td,color:"#CBD5E1",position:"relative"}}>
                            {isSub&&<span style={{position:"absolute",top:1,left:2,fontSize:7,color:"#F87171"}}>⚠</span>}
                            {cell.start||<span style={{color:"#2D3748"}}>-</span>}
                          </td>
                          <td style={{...td,color:"#CBD5E1"}}>{cell.end||""}</td>
                          <td style={{...td,color:"#CBD5E1"}}>{cell.brk||""}</td>
                          <td style={{...td,color:h>0?"#F59E0B":"#2D3748",fontWeight:h>0?700:400}}>{h||""}</td>
                        </th>
                      );
                    })}
                    <td style={{background:isMe?"rgba(245,158,11,.1)":"#1A2535",border:"1px solid #2D3748",borderLeft:"2px solid #475569",padding:"4px 8px",textAlign:"center"}}>
                      <span style={{color:isMe?e.color:"#64748B",fontWeight:isMe?800:400,fontFamily:"sans-serif",fontSize:12}}>{tot>0?tot+"h":""}</span>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

function StaffNoticeView({data, upd, emp}) {
  const notices = A(data.notices);
  const readBy  = O(data.readBy);
  function markRead(nId) {
    const cur = A(readBy[nId]);
    if (cur.includes(emp.id)) return;
    upd("readBy", {...readBy, [nId]:[...cur,emp.id]});
  }
  const sorted = [...notices].sort((a,b) => (b.pinned?1:0)-(a.pinned?1:0) || new Date(b.createdAt)-new Date(a.createdAt));
  return (
    <div>
      <h2 style={{color:"#E2E8F0",fontFamily:"sans-serif",fontWeight:700,margin:"0 0 14px",fontSize:18}}>📢 공지사항</h2>
      {sorted.length===0 && <p style={{color:"#475569",fontFamily:"sans-serif",textAlign:"center",padding:"40px 0"}}>공지사항이 없습니다</p>}
      {sorted.map(n => {
        const isRead = A(readBy[n.id]).includes(emp.id);
        return (
          <div key={n.id} style={{background:"#1E293B",borderRadius:12,padding:16,marginBottom:10,border:"1px solid "+(n.pinned?"rgba(245,158,11,.3)":"#334155")}}>
            <div style={{display:"flex",alignItems:"flex-start",gap:8,marginBottom:6}}>
              {n.pinned && <span>📌</span>}
              <span style={{color:"#E2E8F0",fontWeight:700,fontFamily:"sans-serif",fontSize:14,flex:1}}>{n.title}</span>
              {isRead && <span style={{background:"#D1FAE5",color:"#065F46",borderRadius:99,padding:"2px 8px",fontSize:11,fontWeight:700,fontFamily:"sans-serif",flexShrink:0}}>읽음 ✓</span>}
            </div>
            <p style={{color:"#64748B",fontSize:11,fontFamily:"sans-serif",margin:"0 0 8px"}}>{new Date(n.createdAt).toLocaleDateString("ko-KR")}</p>
            {n.content && <p style={{color:"#CBD5E1",fontFamily:"sans-serif",fontSize:13,margin:"0 0 10px",whiteSpace:"pre-wrap",lineHeight:1.6}}>{n.content}</p>}
            {A(n.attachments).map((f,i) => (
              <div key={i} style={{marginBottom:8}}>
                {f.type.startsWith("image") ? (
                  <img src={f.data} alt={f.name} style={{maxWidth:"100%",maxHeight:300,borderRadius:8,display:"block"}}/>
                ) : (
                  <a href={f.data} download={f.name} style={{display:"inline-flex",alignItems:"center",gap:6,background:"#0F172A",borderRadius:8,padding:"8px 12px",color:"#38BDF8",fontSize:12,fontFamily:"sans-serif",textDecoration:"none"}}>
                    📄 {f.name} 다운로드
                  </a>
                )}
              </div>
            ))}
            {!isRead && <button onClick={()=>markRead(n.id)} style={{background:"linear-gradient(135deg,#10B981,#059669)",color:"#fff",fontWeight:700,fontFamily:"sans-serif",fontSize:12,padding:"7px 18px",borderRadius:8,border:"none",cursor:"pointer",marginTop:4}}>✓ 읽음 확인</button>}
          </div>
        );
      })}
    </div>
  );
}

function StaffReqView({data, upd, emp, canReq}) {
  const [selDate,    setSelDate]    = useState("");
  const [mode,       setMode]       = useState("allday");
  const [selShiftId, setSelShiftId] = useState("");
  const [startT,     setStartT]     = useState("09:00");
  const [endT,       setEndT]       = useState("18:00");
  const [reason,     setReason]     = useState("");
  const [done,       setDone]       = useState(false);
  const [tab,        setTab]        = useState("one"); // "one" | "fixed"

  const week    = A(data.week);
  const reqs    = A(data.reqs);
  const selDay  = week.find(d => d.date===selDate);
  const selShift= selDay ? A(selDay.shifts).find(s => s.id===selShiftId) : null;
  const myReqs  = reqs.filter(r => r.empId===emp.id).sort((a,b) => new Date(b.createdAt)-new Date(a.createdAt));

  // 고정 휴무: employee.fixedOff = [0,1,...6] (0=일,1=월,...6=토)
  const fixedOff = A((A(data.employees).find(e=>e.id===emp.id)||{}).fixedOff);
  function toggleFixed(dow) {
    const next = fixedOff.includes(dow) ? fixedOff.filter(d=>d!==dow) : [...fixedOff, dow];
    upd("employees", A(data.employees).map(e => e.id===emp.id ? {...e,fixedOff:next} : e));
  }
  const DOW_KR = ["일","월","화","수","목","금","토"];

  function submit() {
    if (!selDate) return;
    if (mode==="shift" && !selShiftId) return;
    const allDay = mode==="allday";
    const st = allDay ? "" : mode==="shift" ? (selShift?.start||"") : startT;
    const en = allDay ? "" : mode==="shift" ? (selShift?.end||"")   : endT;
    upd("reqs", [...reqs, {id:Date.now(), empId:emp.id, date:selDate, allDay, start:st, end:en, reason, status:"pending", createdAt:new Date().toISOString()}]);
    setSelDate(""); setMode("allday"); setSelShiftId(""); setReason("");
    setDone(true); setTimeout(()=>setDone(false), 3000);
  }

  if (!canReq) return (
    <div style={{textAlign:"center",padding:"60px 0"}}>
      <div style={{fontSize:52,marginBottom:12}}>🔒</div>
      <h3 style={{color:"#E2E8F0",fontFamily:"sans-serif",fontWeight:700,margin:0}}>현재 신청 기간이 아닙니다</h3>
    </div>
  );

  return (
    <div>
      <h2 style={{color:"#E2E8F0",fontFamily:"sans-serif",fontWeight:700,margin:"0 0 14px",fontSize:18}}>📬 휴무 신청</h2>

      {/* 탭 */}
      <div style={{display:"flex",gap:4,marginBottom:14}}>
        <button onClick={()=>setTab("one")}   style={{...S.btnG,flex:1,...(tab==="one"  ?{color:"#F59E0B",borderColor:"#F59E0B55",background:"rgba(245,158,11,.08)"}:{})}}>📅 날짜 신청</button>
        <button onClick={()=>setTab("fixed")} style={{...S.btnG,flex:1,...(tab==="fixed"?{color:"#A78BFA",borderColor:"#A78BFA55",background:"rgba(167,139,250,.08)"}:{})}}>
          🔁 고정 휴무{fixedOff.length>0&&<span style={{marginLeft:4,background:"#A78BFA",color:"#fff",borderRadius:99,padding:"0 5px",fontSize:10}}>{fixedOff.length}</span>}
        </button>
      </div>

      {/* ── 날짜 신청 ── */}
      {tab==="one" && (
        <>
          {done && (
            <div style={{background:"#D1FAE5",border:"1px solid #A7F3D0",borderRadius:10,padding:14,marginBottom:14,textAlign:"center"}}>
              <p style={{color:"#065F46",fontWeight:700,fontFamily:"sans-serif",fontSize:14,margin:0}}>✅ 신청이 접수됐습니다!</p>
            </div>
          )}
          <div style={{background:"#1E293B",borderRadius:12,padding:18,border:"1px solid #334155",marginBottom:20}}>
            <p style={S.lbl}>날짜 선택</p>
            <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:10}}>
              {week.map(day => {
                const wk=["토","일"].includes(day.label); const isSel=selDate===day.date;
                return (
                  <button key={day.date} onClick={()=>{setSelDate(day.date);setMode("allday");setSelShiftId("");}}
                    style={{background:isSel?(wk?"#7F1D1D":"#1D3A7F"):"#0F172A",border:"2px solid "+(isSel?(wk?"#F87171":"#38BDF8"):"#334155"),borderRadius:10,padding:"8px 10px",cursor:"pointer",textAlign:"center",minWidth:50}}>
                    <p style={{color:wk?"#F87171":"#E2E8F0",fontWeight:700,fontFamily:"sans-serif",fontSize:13,margin:0}}>{day.label}</p>
                    <p style={{color:"#64748B",fontSize:10,fontFamily:"sans-serif",margin:"2px 0 0"}}>{day.date.slice(5)}</p>
                  </button>
                );
              })}
            </div>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}>
              <span style={{color:"#64748B",fontSize:12,fontFamily:"sans-serif",whiteSpace:"nowrap"}}>직접 입력:</span>
              <input type="date" value={selDate} onChange={e=>{setSelDate(e.target.value);setMode("allday");setSelShiftId("");}} style={{...S.inp,width:160}}/>
            </div>
            {selDate && (
              <div style={{borderTop:"1px solid #334155",paddingTop:14}}>
                <p style={S.lbl}>신청 유형</p>
                <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:14}}>
                  <button onClick={()=>{setMode("allday");setSelShiftId("");}}
                    style={{background:mode==="allday"?"rgba(239,68,68,.15)":"#0F172A",border:"2px solid "+(mode==="allday"?"#F87171":"#334155"),borderRadius:10,padding:"10px 14px",cursor:"pointer",textAlign:"left",minWidth:80}}>
                    <p style={{color:mode==="allday"?"#F87171":"#E2E8F0",fontWeight:700,fontFamily:"sans-serif",fontSize:13,margin:0}}>종일</p>
                    <p style={{color:"#64748B",fontSize:11,fontFamily:"sans-serif",margin:"2px 0 0"}}>하루 전체</p>
                  </button>
                  {selDay && A(selDay.shifts).map(sh => (
                    <button key={sh.id} onClick={()=>{setMode("shift");setSelShiftId(sh.id);}}
                      style={{background:mode==="shift"&&selShiftId===sh.id?sh.color+"22":"#0F172A",border:"2px solid "+(mode==="shift"&&selShiftId===sh.id?sh.color:"#334155"),borderRadius:10,padding:"10px 14px",cursor:"pointer",textAlign:"left",minWidth:80}}>
                      <p style={{color:mode==="shift"&&selShiftId===sh.id?sh.color:"#E2E8F0",fontWeight:700,fontFamily:"sans-serif",fontSize:13,margin:0}}>{sh.name}</p>
                      <p style={{color:"#64748B",fontSize:11,fontFamily:"sans-serif",margin:"2px 0 0"}}>{sh.start}~{sh.end}</p>
                    </button>
                  ))}
                  <button onClick={()=>setMode("custom")}
                    style={{background:mode==="custom"?"rgba(56,189,248,.15)":"#0F172A",border:"2px solid "+(mode==="custom"?"#38BDF8":"#334155"),borderRadius:10,padding:"10px 14px",cursor:"pointer",textAlign:"left",minWidth:80}}>
                    <p style={{color:mode==="custom"?"#38BDF8":"#E2E8F0",fontWeight:700,fontFamily:"sans-serif",fontSize:13,margin:0}}>⏱ 직접</p>
                    <p style={{color:"#64748B",fontSize:11,fontFamily:"sans-serif",margin:"2px 0 0"}}>시간 입력</p>
                  </button>
                </div>
                {mode==="custom" && (
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
                    <div><label style={S.lbl}>시작</label><input type="time" value={startT} onChange={e=>setStartT(e.target.value)} style={S.inp}/></div>
                    <div><label style={S.lbl}>종료</label><input type="time" value={endT}   onChange={e=>setEndT(e.target.value)}   style={S.inp}/></div>
                  </div>
                )}
                <p style={S.lbl}>사유 (선택)</p>
                <input placeholder="신청 사유..." value={reason} onChange={e=>setReason(e.target.value)} style={{...S.inp,marginBottom:14}}/>
                <div style={{background:"#0F172A",borderRadius:8,padding:"8px 12px",marginBottom:12}}>
                  <p style={{color:"#64748B",fontSize:12,fontFamily:"sans-serif",margin:0}}>
                    신청: <span style={{color:"#E2E8F0",fontWeight:700}}>
                      {selDate} · {mode==="allday"?"종일":mode==="shift"&&selShift?`${selShift.name} (${selShift.start}~${selShift.end})`:`${startT}~${endT}`}
                    </span>
                  </p>
                </div>
                <button onClick={submit} disabled={mode==="shift"&&!selShiftId}
                  style={{...S.btnP,width:"100%",opacity:mode==="shift"&&!selShiftId?0.5:1}}>신청하기</button>
              </div>
            )}
          </div>
          <h3 style={{color:"#E2E8F0",fontFamily:"sans-serif",fontWeight:700,fontSize:15,margin:"0 0 10px"}}>신청 내역</h3>
          {myReqs.length===0 && <p style={{color:"#475569",fontFamily:"sans-serif",textAlign:"center",padding:"20px 0"}}>내역 없음</p>}
          {myReqs.map(req => {
            const ss = RQS[req.status]||RQS.pending;
            return (
              <div key={req.id} style={{background:"#1E293B",borderRadius:10,padding:"12px 16px",marginBottom:6,border:"1px solid #334155",display:"flex",alignItems:"center",gap:10}}>
                <div style={{flex:1}}>
                  <p style={{color:"#CBD5E1",fontFamily:"sans-serif",fontSize:13,margin:"0 0 2px"}}>{req.date} {req.allDay?"종일":req.start+"~"+req.end}</p>
                  {req.reason && <p style={{color:"#64748B",fontSize:12,fontFamily:"sans-serif",margin:0}}>{req.reason}</p>}
                </div>
                <span style={{background:ss.bg,color:ss.tx,borderRadius:99,padding:"2px 10px",fontSize:11,fontWeight:700,fontFamily:"sans-serif",flexShrink:0}}>{ss.lb}</span>
              </div>
            );
          })}
        </>
      )}

      {/* ── 고정 휴무 설정 ── */}
      {tab==="fixed" && (
        <div style={{background:"#1E293B",borderRadius:12,padding:18,border:"1px solid #A78BFA33"}}>
          <p style={{color:"#A78BFA",fontWeight:700,fontFamily:"sans-serif",fontSize:14,margin:"0 0 6px"}}>🔁 매주 고정 휴무</p>
          <p style={{color:"#64748B",fontSize:12,fontFamily:"sans-serif",margin:"0 0 16px"}}>선택한 요일은 매주 자동으로 휴무 처리되어 자동 생성 시 배정에서 제외됩니다. 관리자에게 바로 저장돼요.</p>
          <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16}}>
            {DOW_KR.map((lb,dow) => {
              const sel = fixedOff.includes(dow);
              const wk  = dow===0||dow===6;
              return (
                <button key={dow} onClick={()=>toggleFixed(dow)}
                  style={{padding:"12px 16px",borderRadius:12,border:"2px solid "+(sel?(wk?"#F87171":"#A78BFA"):"#334155"),background:sel?(wk?"rgba(248,113,113,.15)":"rgba(167,139,250,.15)"):"#0F172A",cursor:"pointer",textAlign:"center",minWidth:56}}>
                  <p style={{color:sel?(wk?"#F87171":"#A78BFA"):"#64748B",fontWeight:700,fontFamily:"sans-serif",fontSize:16,margin:0}}>{lb}</p>
                  {sel && <p style={{color:wk?"#F87171":"#A78BFA",fontSize:10,fontFamily:"sans-serif",margin:"3px 0 0",fontWeight:600}}>휴무</p>}
                </button>
              );
            })}
          </div>
          {fixedOff.length>0 ? (
            <div style={{background:"#0F172A",borderRadius:8,padding:"10px 14px"}}>
              <p style={{color:"#A78BFA",fontSize:13,fontFamily:"sans-serif",fontWeight:700,margin:0}}>
                매주 {fixedOff.sort((a,b)=>a-b).map(d=>DOW_KR[d]+"요일").join(", ")} 고정 휴무
              </p>
            </div>
          ) : (
            <p style={{color:"#475569",fontSize:13,fontFamily:"sans-serif",textAlign:"center",padding:"8px 0",margin:0}}>선택된 요일 없음</p>
          )}
        </div>
      )}
    </div>
  );
}


// ── 앱 렌더링 ─────────────────────────────────────────────────────────────────
const _loading = document.getElementById("loading");
if (_loading) _loading.style.display = "none";
const reactRoot = ReactDOM.createRoot(document.getElementById("root"));
reactRoot.render(<App/>);
</script>
